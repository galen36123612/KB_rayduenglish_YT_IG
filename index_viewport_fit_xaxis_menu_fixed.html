eractions": 2}, {"id": 4, "title": "YouTube｜南美洲航空刷新", "date": "2026/6/1", "data": [{"category": "退稅／Global Blue／海關抽查", "label": "退稅／Global Blue／海關抽查（34.1%）", "answered": 0, "unanswered": 164, "total": 164, "shareTotal": 34.1, "replyPct": 0.0, "unreplyPct": 100.0, "items": [{"type": "comment", "user": "@bookerlin7374", "text": "之前跟團去義大利也是global blue，回程到機場導遊第一件事情就是帶我們去退稅，他說中獎要檢查的機率很低，但還是要小心，然後我們這團就真的有一組人中了，多等了快30分鐘他們才被請出來XD", "reply": "N"}, {"type": "comment", "user": "@pinky53cat", "text": "I also encounted the same problem of tax refund in Korean 8years ago. Lucky my tour guide ls very clever , she asked other tour memeber who brought the same item to hand the item to me after they check in", "reply": "N"}, {"type": "comment", "user": "@HiTS1332", "text": "上次去也是這樣，店家把我的資料都輸錯了導致沒辦法免稅🥲", "reply": "N"}, {"type": "comment", "user": "@rubywu6863", "text": "其實日本現在也是會檢查的。只是遊客實在太多，一般不太會被要求拿出免稅品檢查而已。金額很高的比較有機會。", "reply": "N"}, {"type": "comment", "user": "@yukolalala", "text": "日本的確給各國家的旅客退稅方便，但也被惡質的旅客搞壞了。今年11月就會很多人哀嚎", "reply": "N"}, {"type": "comment", "user": "@phoopshin", "text": "日本也快要取消現購現退了，以後也是去機場退，而且要隨機抽查。", "reply": "N"}, {"type": "comment", "user": "@soave3737", "text": "義大利退稅也是要看完整商品喔\n但拆最外層包裝是沒關係的 但塑膠袋或吊牌要在，沒拆過這樣（之前剛好被抽查到）", "reply": "N"}, {"type": "comment", "user": "@yishaluo5446", "text": "澳洲退税也需要看到商品 如果是液体比如香水 checkin之前有一个Office检查商品然后工作人员会给receipt盖章 东西就可以放箱子托运啦", "reply": "N"}, {"type": "comment", "user": "@yc0930", "text": "上次去韓國 我朋友也是說機場退稅的商品要帶在身上，有可能抽查\n雖然最後我沒被要求看商品~", "reply": "N"}, {"type": "comment", "user": "@anna841213", "text": "退稅完再掛行李！大家記得", "reply": "N"}, {"type": "comment", "user": "@inakiken", "text": "日本的退稅以後也會這樣哦", "reply": "N"}, {"type": "comment", "user": "@kkmm860", "text": "之前在芬蘭搭很早的班機，global blue的櫃檯沒開\n是要上二樓給海關人員蓋章檢查物品之後再投信箱", "reply": "N"}, {"type": "comment", "user": "@janechen4079", "text": "3年前我們去德國\n德國退稅有分2家\n其中一家也是Global Blue\n也是印單出來後去另一個地方檢查掛行李\n導遊有特別交代報到時不可以掛行李\n要退稅完之後才能托運行李\n我們同團真的也有人被抽查", "reply": "N"}, {"type": "comment", "user": "@JiangJiang_23", "text": "我之前也在丹麥被抽查商品😂海關說我的明細太多商品了要抽查。", "reply": "N"}, {"type": "comment", "user": "@May-w7o8k", "text": "台灣退稅也是有抽查機制的哦😂\np/s 來自新加坡然後中了退稅樂透的人", "reply": "N"}, {"type": "comment", "user": "@Frosty_515", "text": "目前有經驗一樣的是新加坡樟宜機場、義大利羅馬機場也是這樣退稅唷！可以先用手機APP確認商家輸入的內容～", "reply": "N"}, {"type": "comment", "user": "@0121Chen", "text": "澳洲是這樣退稅的，而且不是隨機喔～是一定要給他看！（可托運的保健品、液體類要在托運前先去海關的一個辦公室蓋章，他會先確定你有這些商品）\n所以如果要退稅一定要保留盒子把東西裝回去（不用密封），而且要早點去機場，不然你可能會來不及😂", "reply": "N"}, {"type": "comment", "user": "@user-qf3eq4nj1d45", "text": "日本已經是採“後退稅”了⋯⋯所有國家機場都請先退稅再Check in", "reply": "N"}, {"type": "comment", "user": "@yayayeh7605", "text": "當年去那二間店真的敗很多…而且都不怎看麼價錢…圍巾是一人一條…太好買了…但我好像沒有退稅這環節…我是跟團去的…但我去冰島的確是要看我買的要退稅所有東西，所以不是必要環節，但我想還是得確認一下，當初疫情前跟團20天祕魯、玻利維亞團費27萬，加上哩哩扣扣可能不比阿滴少…南美真的是一個對錢包不友善的地方…要小心卻又很值得", "reply": "N"}, {"type": "comment", "user": "@itinghu5258", "text": "1.現在歐洲的間的航線一般來說商務艙也是這樣飛機前3-4排改成商務艙。可以看機型，例如芬航赫爾辛基飛阿姆，有A350的機型，那就是正常大家理解的商務艙座位。\n2.芬蘭赫爾辛基退稅都會抽查，尤其是買精品，千萬不要有僥倖心態。所以都是要先退稅再Check in，預留好時間很重要。", "reply": "N"}, {"type": "comment", "user": "@stephyg9920", "text": "Global Blue应该是有全球抽查。我在瑞典退税三次，有一次被要求拿出来商品，需要是完全没用过的状态", "reply": "N"}, {"type": "comment", "user": "@leannli1880", "text": "第一次去歐洲在荷蘭回台\n就有遇到海關叫我把行李打開給他看\n當時有買奢侈品\n不知是不是因為有高單價商品才要查驗", "reply": "N"}, {"type": "comment", "user": "@Ichih4good", "text": "有點難相信一位到過這麼多國家的人，竟然會敗在退稅的規定和流程😂", "reply": "N"}, {"type": "comment", "user": "@MilkbreadTW", "text": "並沒有 你跟團導遊就會絕對先退稅 所以你是旅遊那麼多次還不知道要先退稅再check in 的僥倖心態 共勉之", "reply": "N"}, {"type": "comment", "user": "@FOX-39728", "text": "所買的商品和旅客一樣都還沒離境；所以海關要檢查旅客的退稅商品和旅客在離境時移民官要求Physical 查驗旅客的道理是一模一樣。既然行李已經托運，自然就無法再享有離境前的退稅機制，除非旅客要求行李退關，但在中南美洲就看他們文化，二來即使幫旅客行李退關成功，可能旅客整段航班應該也泡湯搭不上", "reply": "N"}, {"type": "comment", "user": "@fannychu5407", "text": "怎麼覺得阿滴好帥喔! 謝謝教我們注意退稅的問題! 繼續跟著滴環遊世界🥰🥰🥰", "reply": "N"}, {"type": "comment", "user": "@zoewu9796", "text": "歐洲也是這種退稅的流程😅日本那種退稅方式實在太方便到我第一次在日本退稅的時候還想說「蛤就這樣嗎」", "reply": "N"}, {"type": "comment", "user": "@jingqisun7474", "text": "可能滴以前沒有購物欲爆發，比較沒有感覺。而且法國真的不太查需要退稅的商品，但~~~像英國、比利時的出境退稅檢查就是爆炸嚴格，一定一定要把退稅的商品放HAND CARRY行李最保險，除了退稅方便也可以避免托運的行李被偷", "reply": "N"}, {"type": "comment", "user": "@s311413", "text": "今年11月後的日本 可能也會這樣隨機抽查瞜 \n但一切都還是未知數", "reply": "N"}, {"type": "comment", "user": "@莊可璦", "text": "2012年去義大利退稅領隊有說退稅商品要分托運還是手提，都要拿去檢查蓋章。", "reply": "N"}, {"type": "comment", "user": "@iamboz820", "text": "其實歐美很多短程商務艙，座椅設計都是那樣。至於退稅部分，阿滴之前在歐洲，都沒買到需要退稅的經驗嗎？不然應該有基本概念才對。🥲", "reply": "N"}, {"type": "comment", "user": "@labbug4236", "text": "這趟怎麼多災多難\n會丟GoPro是不是被沒退稅打擊太大", "reply": "N"}, {"type": "comment", "user": "@kelvinchan8510", "text": "日本新的退稅制度也會是這樣，超麻煩的", "reply": "N"}, {"type": "comment", "user": "@pattisu88", "text": "原來就算是阿滴也會因為無法退稅的痛，而分心失神啊🤣", "reply": "N"}, {"type": "comment", "user": "@jason7024ex", "text": "第一次看到商務艙的空間這麼接近經濟艙...個人是完全不會想花幾乎一倍的價格買這一個體驗差距\n順帶一提，看到阿滴的經驗，我也想起來上次到捷奧也是使用Global Blue，同樣是在Check in前做完所有的退稅\n當時還有另外一個稅務服務商，再加上還有直接退到信用卡的模式\n光是釐清哪個是哪個就浪費一堆時間，各位可以到機場前先做完這個動作\n到機場直接走退稅再check in", "reply": "N"}, {"type": "comment", "user": "@史黛菲澳洲生活", "text": "退稅是這樣的，要商品本人在現場，沒被抽檢到是運氣好。歐洲我也是用global blue 商品帶著但被抽檢機率不大，在澳洲沒在跟你抽檢到，是全面檢查！一個一個都要看過，我上個月回台灣前又看到華人旅客連買的衣服都要一件一件核對過才肯蓋章的！", "reply": "N"}, {"type": "comment", "user": "@ninataihua847", "text": "之前去奧地利買好看但好貴的衣服，也是為了退稅排了好久，差一點點就要趕不上check in\n真ㄉ好險🫣", "reply": "N"}, {"type": "comment", "user": "@zihyuhuang6521", "text": "米蘭機場也是這個退稅方式，因為我前面有去歐盟其他國家，所以我只能走人工退稅\n就有遇到前面那組被抽海關抽查但我這邊沒被抽查\n這是隨機抽查的所以一定要托運前先辦理退稅唷！", "reply": "N"}, {"type": "comment", "user": "@賴威宇-u9p", "text": "我利馬去庫斯科也搭過Latam的商務艙 不過主因是他只貴10塊美金 還多送一件托運\nCp值高成這樣不訂真的是傻了\n\n但沒像阿滴一樣遇到開過的水\n水是全新乾淨的\n飲料任選還送了一包在當地超市看蠻貴的有機綜合洋芋根莖片\n\n然後經濟艙應該是什麼都沒有\n想了很久還是想不通為什麼這麼便宜 還沒有先被訂走\n可能航程真的短 當地人連10鎂都沒打算多花？", "reply": "N"}, {"type": "comment", "user": "@梁孟婷", "text": "阿滴，我在台灣的百貨做退稅的工作，我們也是會有抽查的唷！所以我們都會在把退稅單給顧客的時候提醒他們，到機場就先去退稅，因為海關抽查是隨機的，抽查到的話必須要有商品才能辦理退稅，順利辦完退稅之後再去辦理行李托運喔！\n不要難過，因為你幫大家省了更多7700功德無量😂😂", "reply": "N"}, {"type": "comment", "user": "@詩雯-x4q", "text": "如果沒有回到貴賓室，這次的旅程就是損失退稅金跟一台gopro", "reply": "N"}, {"type": "comment", "user": "@RitaHuangB", "text": "澳洲也是要檢查，買了一堆保健食品跟Aesop，通通裝在同一個行李箱，等待被檢查，我要打開行李箱，海關隨便看個兩眼，就幫我蓋章了，大概是覺得到底有需要買這麼多嗎。所以退稅櫃檯是設在外面，不是入關的地方，就是等著檢查吧。我會覺得基本上沒有馬上退稅，要去機場退的，都有抽查商品的可能，沒有是幸運。所以是日本太方便無誤。很多店家都方便你退稅。", "reply": "N"}, {"type": "comment", "user": "@李瑩潔", "text": "之前去瑞士退稅也是這樣，導遊說退稅不可以掛行李，要全部退稅完才能掛行李，隔壁團的雄獅旅客就遇到被隨機抽查行李箱，然後行李已經掛出去了，最後還跑去櫃檯把行李拿出來重新退稅，超級麻煩", "reply": "N"}, {"type": "comment", "user": "@欸-l3n", "text": "退税好像都是这样，最好就是随身携带，避免他们检查的时候没办法提供。这是我朋友告诉我的", "reply": "N"}, {"type": "comment", "user": "@李忠肯-i3p", "text": "我開始害怕日本的到機場退稅服務了...", "reply": "N"}, {"type": "comment", "user": "@lawlaw8785", "text": "18:42 放心 以後日本退稅也是先付後退 😂 在機場慢慢排隊吧", "reply": "N"}, {"type": "comment", "user": "@pinyunlai3688", "text": "澳洲也是要檢查商品之後才能退稅～", "reply": "N"}, {"type": "comment", "user": "@leexiaoping7113", "text": "阿滴 為了 稅金7千7 差點丟掉 相機 好佳在 😅❤🙏", "reply": "N"}, {"type": "comment", "user": "@yuyushih1033", "text": "記得退稅都要先去處理 \n再去航空公司報到 完成後 出關換錢\n記得5-6年前去歐洲 去年去泰國都這樣啊😅😅", "reply": "N"}, {"type": "comment", "user": "@bigbigpotatoe", "text": "退稅時要檢查商品是常識。稅務局培訓店家時就有交代過。", "reply": "N"}, {"type": "comment", "user": "@avalee6240", "text": "應該不是幸運，只是之前的旅行消費金額都不高沒被抽查到，很多機場精品一多就會抽查了\n這是避免有人用免稅價購買，再把商品留在本國賣低價", "reply": "N"}, {"type": "comment", "user": "@wayneteh", "text": "韩国的退税也是哦。。很多国家也是这样的。。", "reply": "N"}, {"type": "comment", "user": "@陳姿伶-d7y", "text": "從德國法蘭克福飛回台灣也是要先退稅檢查，精品一定會被檢查～～", "reply": "N"}, {"type": "comment", "user": "@MM-nj1sc", "text": "之前有在葡萄牙機場退稅過，也是global blue，完全沒有檢查商品耶，只要給他們單子就好了", "reply": "N"}, {"type": "comment", "user": "@yoko152", "text": "沒關係 安慰一下阿滴\n日本現在好像也要改退税制 要變成去機場才能退了😢", "reply": "N"}, {"type": "comment", "user": "@Tinytt2000", "text": "在上海有被檢查過 但真正去了之後也沒檢查 建議還是都退完再掛行李", "reply": "N"}, {"type": "comment", "user": "@毛毛毛毛-i2e", "text": "之前去韓國退稅也是隨機抽檢", "reply": "N"}, {"type": "comment", "user": "@Kobeken99", "text": "其實很多國家在退稅的時候都要看商品", "reply": "N"}, {"type": "comment", "user": "@iamwei4658", "text": "大概10年前去韓國的時候也是機場內退稅，但退稅地點甚至是出關之後，工作人員也是問我們商品在哪他們要看，我們說都托運了之後還好還是給我們退稅了...", "reply": "N"}, {"type": "comment", "user": "@mm9442", "text": "每個國家退稅都是喔，先退再check in", "reply": "N"}, {"type": "comment", "user": "@Fanchaio", "text": "來安慰阿滴 Global blue退稅系統也是超級爛\n之前在機場全部處理好了 但過了好幾個月都沒收到退稅 傳mail過去問的時候他的回覆是海關沒通過\n但我已經非常確定全部都已經給海關蓋章、檢查 投遞信箱了\n要我回到巴黎才能處理 所以我只能認賠 損失了快5萬的退稅\n\n還有我第一次去義大利要回英國的時候 因為英國脫歐了所以帶精品回去會查\n我就把包裝拆開了 海關那時候要檢查說要全新完整包裝\n但那個海關人也很好 我跟他道歉說我們不知道 他最後還是讓我們退了😂", "reply": "N"}, {"type": "comment", "user": "@a405333", "text": "阿滴可能太少買東西了哈哈 有在日韓掃貨的人應該都很習慣退稅的過程", "reply": "N"}, {"type": "comment", "user": "@boboneo903", "text": "我覺得這個影片內容有點假，也許我沒有比阿滴出國的次數多，但是我知道退稅的商品隨時都要帶在身上去退稅以便officer檢查（所以我都會在check in之前做）然後訂機票就已經知道機型 選位置的時候也會看到seat map ，真的別一直拍這類無知的影片", "reply": "N"}, {"type": "comment", "user": "@sherinelee88", "text": "是要等检查的 只是大家多数有一个侥幸心态 或者像你一样 没有什么guideline来自官方 所以就不知道 而且数额比较小 哈哈 比较多退税的数量的国家像日韩 就不太会因为实在太congested 有一些国家会有一个柜台抽检 然后要盖章 才去refund 大多数时候都是盖一盖 就过了 所以大部分人就先checkin 我有一次被抽检 要看全部买的东西 他才肯给我盖 没事 你只是没有很常需要退税哈哈 通常如果你的数额很大 就很容易被抽中 有一点像income tax…？ 哈哈 时装的部分他们好像不会管用没用 但是像美妆产品 好像要原包装", "reply": "N"}, {"type": "comment", "user": "@dmiao", "text": "我覺得是常識。因為之前往返歐盟瑞士退稅的時候，他們還蠻常會要求看商品的，確定你沒有轉手賣給本地人。\n不過我雖然知道，但是每次還是會因為不想大包小包很麻煩，直接先托運走賭他不會查。", "reply": "N"}, {"type": "comment", "user": "@walala212", "text": "所有被抽到的都是要看商品本人😂不過我們在法國過櫃檯 只告訴他在行李箱裡（我們拖在旁邊）他沒有硬要我們打開讓他看 但基本上退稅的物品要帶在手邊 是跟團的話領隊會一直強調 可能阿滴不太跟團所以不知道", "reply": "N"}, {"type": "comment", "user": "@linnikky7019", "text": "我記得出國退稅不是都要在海關給看嗎，我在泰國、新加坡的都是耶😮", "reply": "N"}, {"type": "comment", "user": "@YuHTseng", "text": "謝謝阿滴用親身的慘痛退稅經驗給大家上了寶貴的一課！😂阿滴的心態很正面，值得讚賞👍", "reply": "N"}, {"type": "comment", "user": "@christinelin5901", "text": "阿滴，先提醒你下次別嘗試歐洲航空短程的商務艙，尤其是漢莎集團旗下的商務艙（法航集團的我沒搭過），位置除了跟經濟艙的一模一樣，前後間距也沒有比較大，左右位置也沒變大，就是真的中間空出來沒人坐，然後也沒有螢幕可以看....唯一的差別就是有飛機餐。你可能以為只有歐陸的這樣，但我飛去非洲四小時商務艙也是這樣，基本上只要是窄體客機都是跟經濟艙一樣的位置\n再者，德國機場退稅也是會抽查行李的，通常掛行李看到是外國人都會提醒裡面有沒有退稅物品，因為掛完行李條要再去排另一個退稅櫃檯從一堆收據抽查物品有沒有在行李箱，如果被抽到沒有就整單不給退，檢查完退稅櫃台會有行李輸送帶直接送走你行李，避免有人拿退稅價格在當地使用", "reply": "N"}, {"type": "comment", "user": "@SuHueiChiang", "text": "在歐洲退稅也是一樣的，東西需要被抽檢喔。而且21%大約才推10%吧。另外東西不應該被使用", "reply": "N"}, {"type": "comment", "user": "@toizydog9448", "text": "退稅抽查的部分 不只秘魯 新加坡也是喔", "reply": "N"}, {"type": "comment", "user": "@亡者無懼", "text": "日本2026/11月以後也要機場退稅了，可能也會碰到一堆一樣的問題 QQ", "reply": "N"}, {"type": "comment", "user": "@そうまきょう-e1r", "text": "台灣退稅不是也是要先辦理好退稅再去掛行李？因為海關有可能會要查看商品.", "reply": "N"}, {"type": "comment", "user": "@liongarden88", "text": "還好有阿滴依舊還在碎碎唸拍片固定時間發片，不然每個都像大謙那樣爽爽賺，我們這些平凡人會很捶胸，我知道這樣留言一定會被罵，但真的是我真實感受，看到拍片這麼久還願意這麼認真很感動，偶爾也希望J人阿滴放輕鬆Chill，別這麼檢討自己，現在會正面思考自嘲，很棒！買到羊駝還是有賺啦！稅那些就算了啦！😅\n\n（18:45抱歉您在碎碎唸退稅時，好像只有我我只注意貴賓室牆壁密集恐懼）", "reply": "N"}, {"type": "comment", "user": "@saka6277", "text": "記得這次出國跟著旅行團，那時候導遊人很好，帶著我們跑了一次退稅流程，還跟其他團員說，「不需要退稅的人可以往前走，需要退稅的人，帶著你的單子跟行李箱一起過來，等等有機會被抽查到，所以東西都要帶著。我帶你們跑一次，跟著我做就好」 我整個驚嚇到，哇....原來導遊可以好到這個程度，我們是運氣好沒被抽查到的人，不過我想應該還是有不少人還是要開箱被檢查才是。", "reply": "N"}, {"type": "comment", "user": "@謝彎嬰", "text": "上週剛回來！也是買了sol跟kuna，sol的國籍被輸錯了，所以在退稅機器上刷護照時只顯示出kuna那張單的退稅資訊，我手動掃描sol的退稅單後有顯示在機器上，但機器顯示要我到旁邊辦公室人工檢查sol那張單的商品，我的剛好是帶在身上的披肩，吊牌已剪。辦公室的人翻了一下看上面的商標標籤後就幫我改了退稅單說ok了！\n退稅單上有寫會退多少金額，大約是11%，不過還沒實際收到退稅，不確定是否還有其他手續費～", "reply": "N"}, {"type": "comment", "user": "@angelhuang4126", "text": "當初在荷蘭退稅的時候也遇到這樣的事情，要有商品在手上，但不知為何，我把商品放在大行李箱托運了，但是手提了當時覺得可愛的店家紙袋，於是….在我苦苦哀求下，海關讓我退了，這只是個人單獨一次的好運而已，覺得還是要有商品在手上才行，而且這應該是常識，因為那個海關一副理所當然的樣子", "reply": "N"}, {"type": "comment", "user": "@jphylife1001", "text": "其實退稅國家都是有可能要抽查退稅商品啊，並不是新鮮事啊", "reply": "N"}, {"type": "comment", "user": "@nico1123", "text": "關于退稅的問題，世界各地的退稅公司有幾家不同的系統，大致上大同小異。超過一定金額的話，有非常高機率是被抽查，甚至有幾家系統是只要超過一定金額（例如歐盟國家，消費金額超過2000歐元）就必須在機場退稅點出示你購買的商品、收據/簽單、以及簽單上相符的信用卡，才能得以退稅。他們這樣的做法是避免大額消費被用來再次販售圖利，因為退稅僅限購買商品於個人使用。再者有些機場是禁止機組人員購買免稅商品（曾經被罰過補稅的機組員默默經過🙋🏻‍♀️）。溫馨提醒，global blue退稅系統是各國使用大宗之一，他是有APP的，出國前先下載好，購買商品後可以馬上輸入APP，如果APP上出現任何不符和退稅的問題（例如商家資料輸入錯誤），就可以馬上請商家修正。一來可以馬上看到退稅金額，之後也可以在APP上追蹤退稅進度。以上，祝大家出國購物愉快。", "reply": "N"}, {"type": "comment", "user": "@黃靖元-k9y", "text": "我跟我媽今年從慕尼黑機場回來時也被要求打開行李廂\n幸好導遊有先說 所以我們就把所有退稅商品放在手提行李箱裡", "reply": "N"}, {"type": "comment", "user": "@kaihsu.studio", "text": "04:37 - 哥倫比亞航空商務艙，座位無法平躺，僅能稍微後仰。\n07:37 - 第一段航程的飛機餐點體驗，給予70分的評價。\n09:38 - 第二段航程的午餐體驗，評分為82分。\n11:29 - 哥倫比亞航空單程商務艙票價，比經濟艙多一萬台幣。\n13:44 - 在秘魯利馬機場準備回程，並分享退稅失敗的慘痛經驗。\n15:35 - 因未攜帶商品實體供海關抽查，導致約4300台幣退稅金無法取回。\n20:15 - 登機前才想起GoPro遺留在貴賓室，上演驚險的機場狂奔。\n21:54 - 回程的南美洲航空商務艙，座位可平躺，但價格是經濟艙三倍。\n22:38 - 品嚐南美洲航空商務艙餐點，對比過去經濟艙的經驗。\n24:47 - 結算本次秘魯之旅的總開銷。\n27:28 - 反思旅程花費，認為商務艙和懸崖飯店非必要，提供給觀眾省錢建議。\n\n( 以上由 小結 AI 提供 <3 https://vibetech.tw/summy )", "reply": "N"}, {"type": "comment", "user": "@tuPenguin", "text": "退稅的狀況~ 之前在法國也是如此!\n所以要提早到機場~ 退完稅才能去托運行李~\n日本我記得 10月後也是跟進這個順序 0.0 殘念~", "reply": "N"}, {"type": "comment", "user": "@pattys5993", "text": "補充一下在歐洲所謂的退稅並不是退整個稅率，而是部分的稅金而已，並且是以金額的大小來計算所以不同的商品退回不等的稅金。另外Global blue近幾年來收的手續費越來越誇張，很多年前是以一單單固定的費用到現在以單價的%收費標準．．．體驗非常的差", "reply": "N"}, {"type": "comment", "user": "@jameshsieh2073", "text": "在利馬機場退稅的這個狀況，其實在十幾年前，在巴黎戴高樂機場就遇過，當時導遊特別說，你要退稅的商品，請你退完稅之後再掛行李，海關會隨機抽幾位一件一件看，說是隨機，我們那團三十幾位，就有十幾位要逐件檢查，幾乎快一半，還好我沒被抽到，光那段就花了快一個小時，真是折騰人\n去年再去巴黎，已經是全部電腦化，沒一個被抽中。但還是先退完稅再去掛行李，免得還要抽出來\n補充：Global Blue 是全球性的退税系統，只是台灣和日本有自己的退稅系統，比較不會用其他的退稅系統\n但今年我在東京站一番街買到要退稅，他們的退稅系統就是 Global Blue ，他會看商品，不過不用封，要先刷全額，過幾天後只能用信用卡退稅，所以他會跟你要信用卡，跟在歐洲一樣，要給他實體卡，如果有給mail，幾天後就會收到 mail，我在猜今年底日本的退稅改變，可能會用這種方式", "reply": "N"}, {"type": "comment", "user": "@zoehsu7812", "text": "這兩家航空每次體驗都很不好 去年去了幾次祕魯 1.秤重行李時遇到兩次他們忘記先把體重機歸零在測量 2.還有看完我護照跟機票後忘記還我 提醒後他才還我 3.他們超賣機票導致我的班機我變成沒有位置 我那時候要去美國轉機我不可能搭下一班 最後跟他們櫃台大吵一架後才拿回原本的位置 有一次從庫斯科到利馬的飛機 他們忘了我的托運行李 過了一周才從南美洲回來台灣 真的要發瘋 哈哈哈", "reply": "N"}, {"type": "comment", "user": "@alicecct", "text": "透過Global blue 那種退稅公司，德國19%的稅只會收到10%左右，因此你不能這樣算損失。\n曾經在Mannheim某商店買過一個包，文件在機場蓋章後，找人或是本人拿回原店，就可以拿回19%的稅。", "reply": "N"}, {"type": "comment", "user": "@ianhoi7977", "text": "退稅的事長知識了", "reply": "N"}, {"type": "comment", "user": "@jessicating60201", "text": "阿滴看起來很少退稅經驗喔😂如果買超過多少金額就有可能要去給海關檢查，然後是「消耗品」才不能使用，「非消耗品」像是衣服那類的，是可以在境內使用的", "reply": "N"}, {"type": "comment", "user": "@annachu5486", "text": "真的被日本退稅寵壞 歐美的退稅超麻煩", "reply": "N"}, {"type": "comment", "user": "@annler1705", "text": "Global blue就是和Korea 一样，很麻烦😅😅😅😅😅", "reply": "N"}, {"type": "comment", "user": "@fenesou", "text": "旅行社的......退稅的規則要告知一下啊......", "reply": "N"}, {"type": "comment", "user": "@Letty0528", "text": "不對阿，最後算錢的地方怪怪的，沒退到稅不就是沒省到，為什麼要加上去???本來的4w1是已經扣掉稅的??", "reply": "N"}, {"type": "comment", "user": "@treasureada", "text": "退稅是本來就要帶着商品去辦退稅，你只是比較幸運被抽到要做抽查🤣🤣\n消費稅很貴， 18%🫢🫢\n秘魯果然不是一個平常人家能去的地方", "reply": "N"}, {"type": "comment", "user": "@Gloria66", "text": "我在英國跟馬來西亞是有抽檢的，所以都會記得先退稅再托運😢", "reply": "N"}, {"type": "comment", "user": "@堂本櫻", "text": "買的金額比較高容易被抽驗，\n跟團去歐洲都是先退稅再掛行李⋯⋯", "reply": "N"}, {"type": "comment", "user": "@waterpig0221", "text": "原則上所有國家的退稅都是海關抽查時要全部都在身邊\n至於能不能提前用看國家\n日本是分消耗品和非消耗品\n非消耗品如3c 衣服等是可以在境內使用", "reply": "N"}, {"type": "comment", "user": "@opzoroluffy", "text": "其實看到商品本人才是正規流程\n只是台灣人常去的日韓省略了這個步驟（大概是真要檢查起來要三天三夜）\n然後阿滴不要太難過，消費稅18%也不會全退，還要再加上手續費什麼的扣一堆，最後拿到的錢其實沒有想像的那麼多（每個國家不同）\n之前去荷蘭，弄了一個小時只拿到十歐退稅🤣🤣🤣\n所以很多人都會直接放棄", "reply": "N"}, {"type": "comment", "user": "@tiffanysle", "text": "這是Global Blue正常的手續喔。所以最好先蓋好退稅印章確定不需要檢查。而且有些國家像波蘭有分要check in luggage退稅， 還是hand carry （比較貴要帶在身上的），都要注意就好了。", "reply": "N"}, {"type": "comment", "user": "@lancechen4526", "text": "其實這退稅方式已經很久了，日本也即將使用這種方法，而韓國則已經使用這種退稅模式，雖然韓國當下在店家就可以直接退稅，但只要消費超過100萬韓元以上就必須去機場退稅。\n在韓國機場退稅有兩種狀況，輸入完資料後會有個圈圈或是叉叉（通常消費過百萬韓元一定會是叉叉），叉叉代表要去海關檢查商品，如果東西在托運行李就必須在出境前退完稅，反之在手提行李的話則可以出境之後再退稅。", "reply": "N"}, {"type": "comment", "user": "@ookami_030", "text": "美國飛哥倫比亞飛秘魯，價格沒到兩倍算是給你1.5個位，算是沒太盤。\n但我個人不會選擇。\n\n(經濟艙和躺平的商務艙價差應該4-5倍吧)\n好好笑你和HOOK一起出這個偽商務艙。\n\n退稅其實很多地方都是那樣做，他就是有權查看。\n之前在挪威(印象中)退稅，他也問我們牛仔褲和鞋子在那，我們有很乖的都穿在身上。\n那次他沒有太細看(但我們也沒有太多東西)", "reply": "N"}, {"type": "comment", "user": "@kaitentsai", "text": "那個退稅啊\n今年年底開始，日本也預計改成這種機場退稅的模式，大家記得也要多留時間給退稅，還有退稅前不要托運行李唷～\n啊其實，行李托運下去其實還是可以拿回來啦，只是時間要很久", "reply": "N"}, {"type": "comment", "user": "@vivianchien9585", "text": "機場退稅，有可能會被檢查喔！若同品項買的太多更有可能被抽查，所以要記得蓋完退稅章，再掛行李！", "reply": "N"}, {"type": "comment", "user": "@1528Samantha", "text": "抱歉了阿滴 義大利也是要退稅完再check in喔", "reply": "N"}, {"type": "comment", "user": "@lukelai9598", "text": "基本上單走道機型的飛機商務艙，很多都是豪經艙大小，可能長期在桃園搭到的都是大飛機，所以習慣了，不然像在高雄搭的基本就是那樣😅，而你這次遇到的台灣國籍航空是沒有，但國外不是沒聽過。\n而退稅檢查商品部分，很多國家行之有年，只是大家已經習慣日本，所以才很常沒意識到，雖然日本也即將修改制度。", "reply": "N"}, {"type": "comment", "user": "@oit017", "text": "舉手！曾經我也在維也納機場使用Global Blue服務，一樣是要在拖運前完成退稅，他甚至要我放在「大顆無法手提的行李箱裡面」，確保無法手提上飛機（雖然離開櫃台後要換地方也可以換啊哈哈哈哈哈哈哈）。\n所以只能說，真的是被日本舊的系統寵壞了", "reply": "N"}, {"type": "comment", "user": "@alpan123ify", "text": "台灣也是在機場才可以退稅", "reply": "N"}, {"type": "comment", "user": "@vi2lok", "text": "大家留意一下 韓國（日本也準備）也是會隨機抽查免稅商品的 所以阿滴這個經歷大家也可以參考喔~", "reply": "N"}, {"type": "comment", "user": "@leehsinyi26", "text": "韓國也是有global blue這個退稅系統，在行李托運之前就要去給海關蓋章跟檢查，我個人覺得是比較偏沒常識，每個國家的退稅機制都不同，如果在當地已經消費到需要退稅的金額，花個幾分鐘查一下如何退稅應該也不難吧？而且疫情之後很多規定都有改，我自己就算去過很多次那個國家還是會先查詢一下的😊", "reply": "N"}, {"type": "comment", "user": "@bobdu4041", "text": "不能退稅真的痛 最後的結局真的要筆記下來要買精品直接在機場直接在機場買就好🎉", "reply": "N"}, {"type": "comment", "user": "@shirleypeng5568", "text": "商務艙和經濟艙沒有隔開真令人傻眼！40年前台灣剛開放觀光，我們常買一堆小電器洋酒也從來不知可退稅。😩", "reply": "N"}, {"type": "comment", "user": "@joy00511", "text": "這個隨機抽查被我遇到兩次～～～", "reply": "N"}, {"type": "comment", "user": "@Irene8806", "text": "我去新加坡商務艙櫃檯報到的時候他們也提醒我要先去退稅完再來掛行李！！謝謝星宇的地勤", "reply": "N"}, {"type": "comment", "user": "@dark72128ify", "text": "在澳洲退稅會看你的商品，一定要帶著商品去退稅，而且要包裝完整，還好我妹機靈，退完稅後就在機場拆包裝放進隨身包包裡", "reply": "N"}, {"type": "comment", "user": "@kyle771218", "text": "好有趣，這次真的多災多難，但內容好豐富，比起之前的順利行程更好看！機場退稅真的都是要先退再寄行李。", "reply": "N"}, {"type": "comment", "user": "@leebonita5983", "text": "不用懷疑,歐美小飛機的商務艙均如此.將經濟艙3位改成2位,就是商務艙.餐?從來不期待.至於退稅,海關會隨稽查,通常先退比較保險.不過也會有例外", "reply": "N"}, {"type": "comment", "user": "@lavender.universe", "text": "阿滴的祕魯探險(渡劫)之旅：恐高夜晚的攀岩住宿 (說好的網美住宿滴都位?)、下大雨登黑白彩虹山鞋子全濕、搭到不能躺的商務艙附贈前乘客的水(?)、登機前 20 分鐘狂奔 GoPro 絕地救援，最後還要加上水逆終極之無法退稅，根本電影等級災難片？整支影片雖然超慘但真的太好看了，完全是探險極限，綜藝效果120分(完全沒有SET)，大難不死必有後福 (?) 之後一定一路旺到999年。", "reply": "N"}, {"type": "comment", "user": "@fil801227", "text": "海關會隨機查商品，所以要退稅的商品完全不能拆開使用，我之前的經驗有些商店會先問你有沒有要退稅，要的話他會直接幫你密封包起來，避免你使用", "reply": "N"}, {"type": "comment", "user": "@mymusic0405", "text": "巴黎回來的時候，機場的航空公司都會提醒！先去辦完退稅在check in", "reply": "N"}, {"type": "comment", "user": "@stardust1385", "text": "我第一次沒有退稅成功損失了400-500歐，一模一樣的情況，已經十幾年了那個痛到現在還記得。這樣阿滴感覺有沒有比較好？", "reply": "N"}, {"type": "comment", "user": "@snoopy9588", "text": "我4/24去秘魯，Sol Alpaca全店打五折！我也買超多的！還有機場內的Sol Alpaca跟秘魯境內的，定價高過一般店，並且沒有免稅，店員的說法是，機場租金高，所以貴！Sol Alpaca網路也可以買到，只是無法寄送境外，可能是有代理商制度。", "reply": "N"}, {"type": "comment", "user": "@kiky1208", "text": "是不是以後日本的退稅也會有一樣狀況😮", "reply": "N"}, {"type": "comment", "user": "@py3254", "text": "未來日本退稅系統也要變成機場退稅囉⋯😢\n感謝中國人⋯🙄", "reply": "N"}, {"type": "comment", "user": "@mavis7724", "text": "Global blue會隨機喔，而且金額越大越容易中。義大利也有Global blue，之前同行友人就被抽到了，要拿去小房間檢查免稅品", "reply": "N"}, {"type": "comment", "user": "@Roger-fb2pb", "text": "Global Blue一定會隨機搜查 都要送行李前 退稅", "reply": "N"}, {"type": "comment", "user": "@panda7202", "text": "不用哀怨 ，日本很快也不能直接退稅惹😂", "reply": "N"}, {"type": "comment", "user": "@Auntie1313", "text": "通常買大額的通常都會海關確認蓋章完才check in 行李", "reply": "N"}, {"type": "comment", "user": "@yarabbit", "text": "真的傻眼 誰會沒退稅就托運….\n這還需要提醒嗎…", "reply": "N"}, {"type": "comment", "user": "@vicklee9040", "text": "我們剛剛才從東京回來 在藥妝店買免稅物品的時候店員一直強調說不能把這個袋子打開 但是導遊告訴我們不打開要怎麼裝箱，所以我們就把它全部打散了 😂😂😂 這個故事告訴我們一定要好好的準備應對不同海關退稅的問題 謝謝滴的犧牲😂", "reply": "N"}, {"type": "comment", "user": "@ethanhung5305", "text": "歐洲也是要準備好商品給海關抽查，不過「通常」他們只看高單價精品", "reply": "N"}, {"type": "comment", "user": "@shiao-ying", "text": "不能退稅氣薯，但是羊駝駱馬很貴不管怎麼說買了就是划😊", "reply": "N"}, {"type": "comment", "user": "@cecilyyeh3758", "text": "我會，因為吃的比較好。不能退稅好傷，不想去玩了，好麻煩", "reply": "N"}, {"type": "comment", "user": "@junesau5318", "text": "泰國的退稅也是需要展示物品", "reply": "N"}, {"type": "comment", "user": "@lunareunlar", "text": "說實話喔作為海外地勤，免稅物品隨機抽查的作法一向都有的，有些國家還會要求審查所有要退稅的物品，所以大家要記得，報導託運行李之前*<b>一定要先退稅喔*</b>", "reply": "N"}, {"type": "comment", "user": "@yo.e11a", "text": "退稅那邊阿滴真的做了很棒的示範，情緒穩定地在處理遇到的難關❤\n之前看小X書，有些網紅遇到這種事就會大鬧機場（超沒教養）", "reply": "N"}, {"type": "comment", "user": "@gazette0987", "text": "行李就算已經托運，還是可以拉下來\n而且你又是商務艙客人，隨便說個：阿！我忘記我的行動電源在行李箱裡。\n他們出於無奈也還是會想辦法把你的行李再拉出來的，而且拉行李這件事對地勤來說也是日常不用想太多", "reply": "N"}, {"type": "comment", "user": "@christina_leben_in_de_1821", "text": "這種短程航線的商務艙跟經濟艙本來就是幾乎都長一樣，差別就在於服務內容，歐洲內陸短程航線也都是這樣😂（幫阿滴科普一下，「能不能躺平」要看的是機型+該機型的艙等配置，而不是單看「商務艙」這個字就好～）\n而且畢竟Avianca的主力機隊本來就是A320系列的單走道客機，當然不會跟歐美長程航線的機型是同樣的😂\n但是前一個乘客的水沒有被收掉真的是有點荒謬了哈哈哈，沒退到稅也好慘😅（其實就是以前太幸運從來沒有被抽查到，欠缺了點常識，只能說真的是花了7千多塊台幣買了個經驗，以後就知道了😂🥲）\n因為不是只有秘魯退稅是這樣子，歐盟甚至全球能退稅的地方，機制都差不多，包含日本今年開始要改成的統一機場退稅也是在歐盟早就行之有年的，機場的海關是有權隨機抽查的，基本上消耗品類的東西就是必須全新未拆封的狀態，不然只要你無法證明你的商品沒有在帶出免稅國才做使用，就是不能退稅。所以正確退稅順序一直都是先Check in拿到Boarding Pass之後，去找Customs拿到輸出證明(蓋章在退稅單上或是機台操作)之後才會去拖運行李。", "reply": "N"}, {"type": "comment", "user": "@政緯緯", "text": "日本也要改在機場退稅了", "reply": "N"}, {"type": "comment", "user": "@陳建文-v5x", "text": "退稅品要先拿到機場退稅櫃檯給櫃檯人員看是本來就這樣規定的，而且是退稅的每一樣，所以有時候光一個人就搞很久，尤其是遇到買很多精品的，所以以前大家才說要退稅的最好提早3-4個小時就去機場搞退稅，只是有可能是後來很多國家覺得可能搞太久了，會壓縮到顧客上飛機時間，所以就變成随機抽看，或是純粹發懶不想每個都看，就跟過海關一樣，有些人就被問很久，有些人一下就過了，有些海關人員就超嚴，有些海關人員就超鬆，日本的那些政策也是為了節省旅客為了退稅而多花時間。", "reply": "N"}, {"type": "comment", "user": "@duet5836", "text": "還有更麻煩的、人工退稅櫃檯是有開放時間的、你太早的飛機過去根本沒辦法退稅、人家還沒上班", "reply": "N"}, {"type": "comment", "user": "@MorrisChiu", "text": "以前跟義大利團, 有一位專業買家幫朋友代購了一堆的LV包, 因為他們的超強的收納能力, 把一堆代購的包包都收納至幾個行李箱就搞定. 然後在退稅時, 退稅人員看了單據, 認為只有幾個行李箱怎麼可能裝的下這麼多, 於是要他全部都拿出來一個一個核對. 接下來就看到一整地的LV包包全部陳列在地板上, 很壯觀.", "reply": "N"}, {"type": "comment", "user": "@kiiimiko_2323", "text": "他是根據免稅金額抽查的吧，你買得多，他才選你的。\n11月開始日本退稅也變這樣了，大額的就有可能要抽查，所以不要先寄行李😅", "reply": "N"}, {"type": "comment", "user": "@vivianbaby0308", "text": "那個抽查的好像一直都有，我去義大利還是奧捷導遊有叫我們退完稅再去掛行李", "reply": "N"}, {"type": "comment", "user": "@NaNaH310", "text": "阿滴，基本上在機場退稅都是要給海關看過商品的（每個國家都是），日本也即將要改成這種方式，如果沒被抽查，那算幸運，而且其實它說能退到幾%（例如你說的18%），但實際拿到手的退稅金額會少一些，因為它會加收服務費也是蠻多的，如果拿現金回來扣更多，所以別傷心，只能說花錢上一課。下次要退稅最好先去辦完再check in。", "reply": "N"}, {"type": "comment", "user": "@久就", "text": "小小補充：\n（1）有少部分機場（比如維也納）即便完成安檢進入管制區，管制區內的商店消費仍有可能含稅，需要再找區內的退稅櫃檯再退一次稅\n（2）如果需要轉機，第一站機場安檢後免稅店買的液體或霜狀商品，務必提醒店員後續要轉機需要密封包裝，不然在轉機點安檢時，會被丟棄唷", "reply": "N"}, {"type": "comment", "user": "@chanalfets5830", "text": "我試過去完歐洲點4國，global 要求我寄回當地海關蓋章在發票上，要寄回給他們。但如果他們收不到，就會叫信用卡收回退稅的錢。最主要是他們收不收到單 是他們說了算。😅我朋友就要收回稅款。好彩我跟銀行努力爭取後，銀行自行免了我。", "reply": "N"}, {"type": "comment", "user": "@WenJuLee", "text": "在韓國也是一樣的系統和方式～也是有被抽查的可能，所以退稅單附上的說明書有特別提醒，達到一定金額的話（通常是數萬元），一定要先去詢問海關！", "reply": "N"}, {"type": "comment", "user": "@patrickwang9776", "text": "永遠記得要退稅的貨物：\n1）隨身行李\n2）不要開封，留著吊牌\n\n不論是日韓、歐洲或者美洲都一樣了。", "reply": "N"}, {"type": "comment", "user": "@jinfenshih7944", "text": "記得有一次在英國機場，退稅櫃檯是在出境之後，因為不確定是否會看，免稅品只能當隨身行李帶進去了", "reply": "N"}, {"type": "comment", "user": "@jannywang5001", "text": "沒錯，之前去歐洲2次也是隨身攜帶免稅品怕被抽查，之後去日本就無法直接退稅……哭", "reply": "N"}, {"type": "comment", "user": "@lighmeltw2586", "text": "原來 前陣子第一次旅歐 導遊說要先去辦退稅才能去托運行李 因為退稅看物品是隨機的 大家行李讓免稅品靠上好拿取比較好喔", "reply": "N"}, {"type": "comment", "user": "@ciaoyogi", "text": "之前在澳洲買了很多ＡＥＳＯＰ也是因為買'保養品超過100ml，CHECKIN後進托運行李，結果退稅櫃台說要拿出來給看，才沒退到稅啊~~~但那個退稅櫃台在入海關之後，根本一個無法退啊!甚麼鬼?", "reply": "N"}, {"type": "comment", "user": "@nyagopig1212", "text": "@久就如果轉機去美國 (例如在韓國轉機去美國), 在機場管制區內免稅店買液體或霜狀商品都不能上機。就算密封包裝都不能。 在轉機時， 還有再過一次安檢才可以上機。免稅店看見機票最終目的地是美國直接不賣給你。", "reply": "N"}, {"type": "comment", "user": "@ansonm5133", "text": "退稅的部份好慘，這部影片我幫你看10次", "reply": "N"}, {"type": "comment", "user": "@kokochen8936", "text": "以曾經在歐洲退稅Global Blue的經驗，是不會退到預期的%（例如：預期18%，但不知道扣了什麼手續費、信用卡手續費用、或換匯之內的費用，實際上只退稅 10%左右而已）。 \n所以 ，也不是真的損失18% 😅。本來順利辦好退稅，也是不會退稅退到那麼多。", "reply": "N"}, {"type": "comment", "user": "@Qazwsxedc-q4m", "text": "退稅好慘😂", "reply": "N"}, {"type": "comment", "user": "@羅昭月", "text": "好久沒有看飛機餐開箱這次是南美洲航空商務艙開箱還有貴賓室，看影片的感覺不好也不壞，但學到了退稅的經驗，還有回台灣這趟秘魯總結的時候，看到阿滴手手一直再抓抓抓，要注意身體健康的狀況，秘魯的影片每一部都很好看，這趟秘魯旅程拍攝相當不容易，但很值得，難忘經驗回憶，期待下個旅程。", "reply": "N"}, {"type": "comment", "user": "@AnthonyLai120", "text": "這次秘魯總花費超出預算，羊駝毛產品就花了41,740塊錢\n阿滴告訴大家在托運行李前完成退稅，沒有退到7740塊，上了一課，接下來就在登機之前把Go Pro丟在貴賓室，還好有找回來，跑回去好喘", "reply": "N"}, {"type": "comment", "user": "@carey1099", "text": "退稅都要在辦理登機之前 您可能是之前都比較幸運所以沒被抽查到而已", "reply": "N"}, {"type": "comment", "user": "@mushgoodlife", "text": "我願意多看幾次，那個不能退稅的真的好痛", "reply": "N"}, {"type": "comment", "user": "@pinhsienlee203", "text": "近程的商務艙真的很多都是這樣，歐洲內陸的商務艙也是（隔壁棚Hook KLM食物更慘哈哈哈）\n我覺得是差在手提行李確保可以上機（最近幾年歐洲很常超賣，經濟艙的話很常會被臨時變成check in行李），然後可以優先上機跟領行李。\n考量到這幾年機場人潮可怕的狀況，不太用等這一點大概就是最大的優點。\n\nGlobal blue規定上是都有說可能會隨機查，如果他問你要能夠出示，但實際上通常是要到價格可觀的精品才比較容易被問😂", "reply": "N"}, {"type": "comment", "user": "@jackowang3370", "text": "不過話說今年年底日本退稅方式也會改成類似這種路線了", "reply": "N"}, {"type": "comment", "user": "@zih_shyuanyang", "text": "韓國也是有機場退稅的 到一定金額就會要你給海關檢查（不能托運）", "reply": "N"}, {"type": "comment", "user": "@touyahinomot", "text": "澳洲的退稅如果要托運要先去找海關檢查跟蓋章，然後才可以去check in ，出關之後還要再去排隊退稅，這時候會檢查你隨身的免稅品，我記得歐洲機場好像是隨機抽查（？，11月後日本也是一樣隨機抽查，要記得先去刷護照退稅確定不用抽查才可以去寄行李喔～", "reply": "N"}, {"type": "comment", "user": "@Chung_Jen", "text": "日本11月開始改成要到機場退稅了", "reply": "N"}]}, {"category": "搞笑反應與支持留言", "label": "搞笑反應與支持留言（24.9%）", "answered": 0, "unanswered": 120, "total": 120, "shareTotal": 24.9, "replyPct": 0.0, "unreplyPct": 100.0, "items": [{"type": "comment", "user": "@ZooeyHappyLife", "text": "達美也是 @@??", "reply": "N"}, {"type": "comment", "user": "@QQ-hn7ue", "text": "心態穩住，前面整個笑死", "reply": "N"}, {"type": "comment", "user": "@bdkim0130", "text": "原來是山西Tim哥 還以為是阿滴", "reply": "N"}, {"type": "comment", "user": "@lilpippi4241", "text": "有錢！！！請人跟抽獎的錢就免算了", "reply": "N"}, {"type": "comment", "user": "@yoshiyeh", "text": "洋陀毛也太貴了吧！？", "reply": "N"}, {"type": "comment", "user": "@藹凌-d4v", "text": "機場有同樣的店不能去反應嗎？如果是我可能當場氣s了😮他們這樣可能很多人吃虧耶😅7千多😢😢", "reply": "N"}, {"type": "comment", "user": "@藹凌-d4v", "text": "😂😂😂😂😂😂😂阿滴😅", "reply": "N"}, {"type": "comment", "user": "@lanihu83", "text": "中南美真的...做什麼都爆貴", "reply": "N"}, {"type": "comment", "user": "@聖聖兒", "text": "15:30 滴哥不是常出國嗎？不可能都沒遇過吧？我以為這是常態欸😂", "reply": "N"}, {"type": "comment", "user": 也是，美國反正就把南美和加拿大都納入自己的後花園內呀！所以都是domestic flights!", "reply": "N"}, {"type": "comment", "user": "@kaitentsai", "text": "桃園函館，這個航線好久以前了😂😂", "reply": "N"}, {"type": "comment", "user": "@StellaWu-m8h", "text": "以前家裡也出現過那個麵疙瘩，不知道怎麼來也不知道怎麼處理，就照著網路上食譜亂做，我們家的吃起來裡面還會酸酸的，怪可怕。", "reply": "N"}, {"type": "comment", "user": "@shihpuyang3999", "text": "HOOK 已經提早體驗過了😂", "reply": "N"}, {"type": "comment", "user": "@ZumbleFlix", "text": "Seatguru 已經不準了，要看AeroLOPA", "reply": "N"}, {"type": "comment", "user": "@BerryHuang", "text": "阿滴這麼J都出這麼多意外⋯真是完美演繹了人算不如天算⋯⋯", "reply": "N"}, {"type": "comment", "user": "@許十六-n4m", "text": "我有被檢查過", "reply": "N"}, {"type": "comment", "user": "@rosefangrosefang", "text": "這開場感覺昨天才看過一樣的狀況哈哈哈", "reply": "N"}, {"type": "comment", "user": "@ritashiao", "text": "對呀！", "reply": "N"}, {"type": "comment", "user": "@Nsy24930-j", "text": "太好笑 和互可一樣😂", "reply": "N"}, {"type": "comment", "user": "@Kobeken99", "text": "現在主力拍的影片類型也是跟hook一樣，影片的流程也一模一樣", "reply": "N"}, {"type": "comment", "user": "@zoechiang9819", "text": "我記得商品涉及高單價的話就比較容易被查，之前日韓買精品的時候也是得放手提檢查才能帶出境～", "reply": "N"}, {"type": "comment", "user": "@v4100n", "text": "好好看😻", "reply": "N"}, {"type": "comment", "user": "@NaoOgata", "text": "讓我想到HOOK剛上的片🫣😆", "reply": "N"}, {"type": "comment", "user": "@menghungtsai5343", "text": "😂😂😂😂", "reply": "N"}, {"type": "comment", "user": "@eru-x8n", "text": "那要先點魔抗🫠", "reply": "N"}, {"type": "comment", "user": "@OiiYiOiiYi", "text": "ha", "reply": "N"}, {"type": "comment", "user": "@RoseLIU0921", "text": "先搶簽到", "reply": "N"}, {"type": "comment", "user": "@JasonWu1105", "text": "🦥簽到", "reply": "N"}, {"type": "comment", "user": "@Wong_K_96", "text": "阿滴\n我来自马来西亚🇲🇾粉丝❤\n我第一报道❤", "reply": "N"}, {"type": "comment", "user": "@litingting4079", "text": "頭香❤", "reply": "N"}]}, {"category": "航空公司／商務艙／機型座位", "label": "航空公司／商務艙／機型座位（24.1%）", "answered": 1, "unanswered": 115, "total": 116, "shareTotal": 24.1, "replyPct": 0.9, "unreplyPct": 99.1, "items": [{"type": "comment", "user": "@CakeX1717", "text": "哥倫比亞航空的旗艦機型是787系列，但你是搭到320的，所以比較遭，南美航空的旗艦也是787，然後你搭到的也是787；最後，歐美那塊的短途航線商務艙是有時會往後增加的，因此可能有人搭經濟艙搭到商務的位置", "reply": "N"}, {"type": "comment", "user": "@Frequenttrveller", "text": "歐洲航空公司的商務艙也是只有經濟座位", "reply": "N"}, {"type": "comment", "user": "@pmpm5400", "text": "厲害，沒有接到飛機的工商，都說不過去了，這麼硬誇，真是難為你了", "reply": "N"}, {"type": "comment", "user": "@s1s697", "text": "我做過日航的商務艙到倫敦轉機到巴塞隆納（全程商務艙票價）、跟阿迪的狀況一樣甚至更慘。倫敦飛巴塞隆納那段坐英航⋯⋯跟經濟艙一模一樣一排三個座位⋯⋯中間還沒小桌子嘞。商務就是前面的幾排位子、經濟艙中間就是窗簾還沒隔離板。", "reply": "N"}, {"type": "comment", "user": "@rdhsu", "text": "歐陸的商務艙也很常這樣喔\n長得跟經濟艙一模一樣，但就中間的位置不賣", "reply": "N"}, {"type": "comment", "user": "@jiajehlee5690", "text": "EuroBiz 也一样哦，blocked centre seat", "reply": "N"}, {"type": "comment", "user": "@gracewu3376", "text": "正面思考...這集超精彩...讓你想像不到的商務艙體驗...哈哈哈", "reply": "N"}, {"type": "comment", "user": "@user-qf3eq4nj1d45", "text": "中型機和大型機座椅本就差很多，和經濟艙價差也不同（中型2倍/大型3倍）", "reply": "N"}, {"type": "comment", "user": "@es.charlotte", "text": "自己查一下機型很難嗎", "reply": "N"}, {"type": "comment", "user": "@user-skyaircloud", "text": "雖然國外風景美，但總是台灣的食物還是超好吃，飛機餐也是超讚的😂😂😂", "reply": "N"}, {"type": "comment", "user": "@francislinyufan1", "text": "真的，中短程比較好的航空公司都是亞洲的航司…. 再來除了中東的以外，歐洲、北美以及其它的，差不多就這樣\n（其實德航飛歐洲境內的，商務艙也是中間不坐人；你這一班中間的桌面還特製、坐椅稍大、還有多桌下置物空間及插座；德航的卻是正常經濟艙坐位、直接在中間坐位扶手上加裝一個桌板….）", "reply": "N"}, {"type": "comment", "user": "@CYLHKG", "text": "安全帶一包的是因為你前面就是牆壁，不是因為商務艙", "reply": "N"}, {"type": "comment", "user": "@劉知微", "text": "這有什麼好新奇的 很多較小的飛機商務艙都是這樣 歐洲我也搭到好幾次這種的", "reply": "N"}, {"type": "comment", "user": "@irishsu9105", "text": "阿根廷老公第一次搭華航真的有文化衝擊一直跟他南美家人朋友宣傳華航", "reply": "N"}, {"type": "comment", "user": "@JerryHung1", "text": "Avianca JFK-BOG 看來是A320\n\n北美 歐洲 內陸商務艙都是這樣囉\n只能找廣體飛機 雙走道 才能平躺", "reply": "N"}, {"type": "comment", "user": "@FOX-39728", "text": "各艙等價錢是浮動的，會多花一萬也是因為商務艙訂的人增加、系統設定而產生的疊加機制。\n\nAvianca 基本就像一堆東南亞籍飛台灣再以第五航權延遠的航空公司，真的別奢望cabin會有相對明顯的差異提升", "reply": "N"}, {"type": "comment", "user": "@terry-s5q5v", "text": "會是一樣的機型嗎-會是一樣的畸形嗎😂", "reply": "N"}, {"type": "comment", "user": "@melissaliu608", "text": "去年10月我剛好有搭Avianca從美國到波哥大，讓阿滴安慰一下（？，十排後的座位是完全不能調整椅背的（我回程加價買前面的座位才知道原來前面的椅子可以調椅背），而且經濟艙那個零食和瓶裝水是要付費才有的😅\n我去程坐最後一排，行李還沒地方放，空服員要我放在座位旁或另一邊沒人的座位上", "reply": "N"}, {"type": "comment", "user": "@YiFanFeng", "text": "歐洲內的商務艙也常常是把中間鎖住而已。", "reply": "N"}, {"type": "comment", "user": "@八極麻花捲", "text": "少見多怪！在歐洲小飛機的商務艙都是這樣的。兩人中間空個子就不擠啦而且在最前面好進出。又不是貴多少還有什麼好抱怨的。", "reply": "N"}, {"type": "comment", "user": "@hkriderintw", "text": "我坐過KLM和CONDOR歐洲的國內線，很多都是給你一整排的經濟艙就當作是商務艙", "reply": "N"}, {"type": "comment", "user": "@zaclin1048", "text": "我非常推薦阿滴可以去搭一次衣索比亞航空，Bad的程度不方便多說，但你應該會得到很多流量😂", "reply": "N"}, {"type": "comment", "user": "@chenghueikuo9428", "text": "This is the same Biz class if you fly within europe...", "reply": "N"}, {"type": "comment", "user": "@xo123852", "text": "坐飛機最好不要坐1A逃生口確實比較寬敞好坐，", "reply": "N"}, {"type": "comment", "user": "@顏饅頭-b1t", "text": "為什麼覺得有一點點想笑😂？ 商務艙 經濟艙 😅", "reply": "N"}, {"type": "comment", "user": "@校門口紅線請勿停車", "text": "飛機餐一餐5000，划算!", "reply": "N"}, {"type": "comment", "user": "@chinesehealthorganization3627", "text": "不是，常常覺得你們團隊蠻好笑的\n為什麼訂機票時都不會看一下班次/機型呢？ 大型的航空公司各機型的座位圖都蠻好找的啊⋯\n又不是第一次搭飛機了，也不是臨時訂票或突然被換飛機⋯", "reply": "N"}, {"type": "comment", "user": "@byuni71", "text": "😅我这辈子坐过最差的飞机就是avianca", "reply": "N"}, {"type": "comment", "user": "@chengtaogai5880", "text": "真的不要把任何州的航空服务跟亚洲航空比😂😂😂 都被惯坏了😂😂😂 坐习惯了北美航空 在回去坐亚洲航空 觉得服务怎么那么好😂😂😂 都不习惯了😊😊😊", "reply": "N"}, {"type": "comment", "user": "@hanayc129", "text": "Avianc 疫情後走下坡，除非行程時間對不上，要不然大部分的人會選擇Latam not Avianca。而影片中的商務艙主要還是因為航線和班機型號的配置。", "reply": "N"}, {"type": "comment", "user": "@dellal8955", "text": "美國境內的商務艙也是一樣的。以後不要亂花錢了⋯⋯哈哈哈哈。\n它們的商務艙設計是賣給大胖子坐不下小椅子的高大胖子們的，不是賣給要享受奢侈的旅客。", "reply": "N"}, {"type": "comment", "user": "@IMK68", "text": "這不是詐騙😂\n我坐到台北-釜山的商務艙也很⋯一言難盡", "reply": "N"}, {"type": "comment", "user": "@iamhannah05", "text": "好好奇阿滴搭過那麼多趟的飛機 有沒有遇到什麼比較特別的事件或是讓你感到害怕的時候？", "reply": "N"}, {"type": "comment", "user": "@clamp3333", "text": "分享一下 我去祕魯19天17夜 總花費是105000元[東西買不多，畢竟行李箱只有一個]\n，不過當然買到超便宜的長榮來回機票［24000元+8000元回程豪經倉 ] ，住宿也沒有住不好，都是三四星等級或市民宿\n當年雄獅旅行團也是19天是27萬元", "reply": "N"}, {"type": "comment", "user": "@1ln932", "text": "我上次搭美國聯合航空 加1700多台幣的豪華經濟艙跟經濟艙一樣", "reply": "N"}, {"type": "comment", "user": "@obs183035079", "text": "我吃過最難吃的目前是菲律賓航空", "reply": "N"}, {"type": "comment", "user": "@edwinto9509", "text": "可以上網先查一下機型再下單買吧，有時候前後班機不同機型差好遠", "reply": "N"}, {"type": "comment", "user": "@alexchiu8292", "text": "請看下機票艙等跟機型信息,南美洲航空不管是latam 或 avianca 基本全是 A320 空中巴士就沒有所謂的商務艙只有豪經艙。latam 已開始換更換機型， 或建議下次可以搭巴拿馬航空的copa 幸運有737 MAX..... 長期住拉美的台灣人建議🎉😊", "reply": "N"}, {"type": "comment", "user": "@潤氏伯爵", "text": "我超討厭搭飛機，很佩服能常飛的人", "reply": "N"}, {"type": "comment", "user": "@Danniel0927", "text": "華航新飛機也這設計，號稱奴隸艙", "reply": "N"}, {"type": "comment", "user": "@mengmeng332", "text": "欧洲境内短途的商务舱都是这样啊", "reply": "N"}, {"type": "comment", "user": "@waterIvanHu", "text": "不能躺平的商务舱真的是性价比很低", "reply": "N"}, {"type": "comment", "user": "@阿扉-m3r", "text": "通常要坐商務艙\n不管長短程\n有華航長榮就華航長榮\n沒有就阿聯酋\n歐美的商務艙真的滿多超雷\n之前很常看到荷航英航的商務艙座位跟經濟艙一樣\n只差在有餐跟拉簾子", "reply": "N"}, {"type": "comment", "user": "@doraexplorer778", "text": "南美航空絕對是最爛沒後之一，去年也是去了秘魯八個小時飛機從洛杉磯到出發我的兩餐吃的一模一樣全部碳水", "reply": "N"}, {"type": "comment", "user": "@karin0000", "text": "這不是商務艙，是盤子艙了😂", "reply": "N"}, {"type": "comment", "user": "@PeiHsuanLity", "text": "南美餐點方面本來以為是我個人口味問題，沒想到阿滴也有相同想法😂\n亞洲的航空餐點真的是超棒。", "reply": "N"}, {"type": "comment", "user": "@anton7", "text": "阿滴，是因為你不知道Avianca 經濟艙沒有往後躺的按鈕", "reply": "N"}, {"type": "comment", "user": "@anguslababy9986", "text": "哈哈。。。。乱乱花钱买商务舱的体验", "reply": "N"}, {"type": "comment", "user": "@a27503888", "text": "12:07 我會想多花一萬，坐飛大阪經濟艙的椅子", "reply": "N"}, {"type": "comment", "user": "@koushi4437", "text": "我以為商務艙會依飛機機型會有所不同跟航空公司比較沒太大關係，難道不是嗎？", "reply": "N"}, {"type": "comment", "user": "@NatalieOn", "text": "所以我每次都會check機型號", "reply": "N"}, {"type": "comment", "user": "@楊詠然-m7z", "text": "還有另一家 Copa ，6小時的航程餐點只有\"兩小條吉拿棒+焦糖牛奶醬\" 配咖啡\n很幽默...", "reply": "N"}, {"type": "comment", "user": "@NoelLuTW", "text": "這已經比歐洲飛歐洲的商務艙好了", "reply": "N"}, {"type": "comment", "user": "@LostInTheDeltaQuadrant-t6v", "text": "坐南美洲的航空真的是令人非常緊張的一件事情。去年我也是因為要去南極，沒辦法要在南美洲待幾天。 LATAM 在南美洲算是已經不錯的航空公司，但是沒有一趟班機是準時的，不然就是被cancel。不過他們小型飛機的商務艙也還好，如果你飛歐洲短程的比如說英國到法國，不同歐洲的航空公司他們所謂的“商務艙‘也是中間只隔開一個位子，跟LATAM短程是一樣的。我有做LATAM從洛杉磯到南美的商務艙，雖然可以平躺，但是超級不舒服的，腳幾乎沒有地方可以放", "reply": "N"}, {"type": "comment", "user": "@angelalu8026", "text": "AVIANCA 以前連一瓶水都沒有 現在有給了 😅", "reply": "N"}, {"type": "comment", "user": "@pureworldofjingjing", "text": "商務倉不是頭等倉，坐在前面一點方便進出而已🫢。這也是我的教訓，加了錢升級為商業倉，結果跟經濟倉幾乎是一樣，只是在前排一些而已😅", "reply": "N"}, {"type": "comment", "user": "@mattzhu705", "text": "阿滴Avianca的小飛機商務艙，至少還有一點點商務艙的痕跡，看看Hook的荷航，還有我自己幾天前經歷的漢莎，只要是申根區內啊，英國啊這些，只要是歐盟的航空公司，全都是經濟艙座椅隔開中間座位變成商務艙，法荷航，英航，伊比利亞，漢莎瑞士奧地利，無一例外😢", "reply": "N"}, {"type": "comment", "user": "@yang5411", "text": "Base在歐洲，一年飛至少5-60腿以上，歐洲傳統航空LH漢莎、LX瑞航、LO波蘭航空等等，商務也都長這副德性，甚至中間沒有東西擋著，除非少數航空跟機型才有1-1配置，不能以亞洲中東標準看世界XD", "reply": "N"}, {"type": "comment", "user": "@PSPHE93", "text": "歐洲大部分的窄體客機 經濟艙跟商務艙沒變化 中間位子隔開而已 餐點服務 香檳", "reply": "N"}, {"type": "comment", "user": "@ming2892", "text": "其實認真算哥倫比亞航空的商務艙很划算\n亞洲這邊 豪經艙就會比經濟艙貴1倍以上\n5個小時的航班豪經艙也比哥倫比亞航空的商務艙貴|\n另外他們737的椅子不能調整斜度 只能固定角度 而且超窄\n如果旁邊坐人應該是縮著肩膀的 椅距也小很多 很像廉航\n\n整體評估下來還是乖乖買商務艙吧 反正價差沒那麼多😆😆😆", "reply": "N"}, {"type": "comment", "user": "@moz0701", "text": "找出經濟艙跟商務艙的差別…\n讓人有點心酸", "reply": "N"}, {"type": "comment", "user": "@gracelux", "text": "你怎麼會覺得台灣飛機餐屌打南美洲的?culture shock 是一定有的,一如我們也有吃不慣別國的飛機餐,這跟艙等沒有100%的關聯,我搭國航不管什麼艙等我都一律不吃飛機餐,我都要求不要送,只給我一顆餐包就好,我不想浪費食物,因為我連打開的慾望都沒有,經過飛機加熱過的食物我個人無法.. 外國人聽到台灣的早餐是稀飯也很崩潰啊..用台灣人的角度看世界不是您旅遊過全世界的人該有的想法..", "reply": "N"}, {"type": "comment", "user": "@755179", "text": "錢全花在貴賓室，+5千就會選商務艙", "reply": "N"}, {"type": "comment", "user": "@SeanChen5487", "text": "中小飛機的商務艙長這樣很正常，頂多給你個簾子把商務艙經濟艙隔開，所以訂航班還是得先看飛機規格再決定要不要買商務艙，真的不值得", "reply": "N"}, {"type": "comment", "user": "@ineslai3761", "text": "Latam是目前南美最好的航空Avianca ", "text": "謝謝阿滴讓我們知道以後不要搭南美洲的商務艙？？", "reply": "N"}, {"type": "comment", "user": "@yongtk9063", "text": "This should be called \"Premium Economy Class\"", "reply": "N"}, {"type": "comment", "user": "@beanjai2615", "text": "看來你八字跟東南方不太合啊，往西飛你滿順的。\n不過domestic flight就是這樣呀，非亞洲航空通常都不用太大期望啦。\nAlpaca買那麼多在台灣有機會穿嗎？不會很熱？", "reply": "N"}, {"type": "comment", "user": "@Anderson-w8e2h", "text": "窄體客機就不用花錢升級當冤大頭了", "reply": "N"}, {"type": "comment", "user": "@patrickwang9776", "text": "歐洲內陸的商務艙也是這樣喔，不能躺平。", "reply": "N"}, {"type": "comment", "user": "@mengmeng332", "text": "对呀 欧洲境内短途商务舱都是这样的啊", "reply": "N"}, {"type": "comment", "user": "@edwinyu4231", "text": "可能需要在購賣機票的時候就關注一下飛機型號喔，對應的就是商務艙可能的規格🤣", "reply": "N"}, {"type": "comment", "user": "@victorhsu-i2h", "text": "AVIANCA 不錯啊 位置很大，242的根本就是豪經...\n下次可試試COPA AIRLINE，那才是普...", "reply": "N"}, {"type": "thread", "source_user": "@vicklee9040", "source_text": "只多加1萬我覺得還行呀 買個自由跟餐點😊", "author_user": "@rayduenglish", "author_text": "Hook有荷蘭航空\n我有親愛的南美洲航空", "confidence": "高", "method": "直接相鄰推定"}, {"type": "comment", "user": "@35-------------P-dy", "text": "五個小時這樣真的蠻扯的 我記得好像歐洲短程一兩個小時商務頭等才會用這種三合二的 5個多小時的航班 用airbus a320neo全經濟艙位就是廉航啦 還想要賺商務艙旅客的錢 吃相難看", "reply": "N"}, {"type": "comment", "user": "@LeLeafy757", "text": "不要忘記會摔吉他的美聯航😂", "reply": "N"}, {"type": "comment", "user": "@kenlin1478", "text": "Mexican airline 商務艙是真的喔", "reply": "N"}, {"type": "comment", "user": "@wolfstarck", "text": "你去看一下台灣飛日韓的 A320 大商務艙，就完全不是你說的那樣，所以說跟機型有關只說對了一半，主要還是看航空公司要怎麼搞", "reply": "N"}, {"type": "comment", "user": "@christina_leben_in_de_1821", "text": "​@wolfstarck我也已經有說了，要看的是機型艙等配置，也就是看各航空公司怎麼設計喔，不過也謝謝你補充說明地更清楚。", "reply": "N"}, {"type": "comment", "user": "@aezmkmi", "text": "華航A330的商務艙也是類似現在的豪經艙，有大椅子但無法躺平，星宇的A321neo的商務艙是可以躺平的，但跟廣體機的還是差很多，英國航空甚至還有夾在兩個座位之間反向座商務艙，跟兩個隔壁乘客尷尬面對面，而且還很窄所以在買機票之前最好是先查航空公司和機型，看看別人的開箱比較好", "reply": "N"}, {"type": "comment", "user": "@sherrykao1017", "text": "通常要航程夠長才會有可完全躺平的座位，亞洲飛歐美一定有，台灣飛東南亞國家我也坐過不能躺平的商務艙，頂多位置寬大一點、有點仰角；\n最搞笑的是歐洲內陸飛行的短程商務艙，座位大小跟經濟艙一模一樣！只差在有送瓶裝水、有咖啡跟點心的服務，左3右3的中間座位沒坐人，就看著空服員推著餐車只送到第5還是第6排😅😂 做出「後面的沒有」的差別待遇，這樣叫做商務艙😂 我之前搭瑞士航空從日內瓦飛巴塞隆那就是這樣搞😂", "reply": "N"}, {"type": "comment", "user": "@finemoney1", "text": "搭飛機旅行真的是非常考驗時間和體力😮", "reply": "N"}, {"type": "comment", "user": "@skynorman817", "text": "台灣的飛機餐幾乎屌打全世界~!", "reply": "N"}, {"type": "comment", "user": "@chimiuzzz", "text": "我覺得中東的卡達航空、阿聯酋。新加坡的新航。泰國的泰航都比台灣的好吃喔~", "reply": "N"}, {"type": "comment", "user": "@ariellai4469", "text": "我們是秘魯+玻利維亞2人19天，全部（含機票+伴手禮+保險）共25萬，一人42.8真的奢啊😂，然後南美航空的食物真的不行啊😅", "reply": "N"}, {"type": "comment", "user": "@peggywang2598", "text": "感謝阿滴，在看這個影片之前，我一直以為商務艙都是能躺的(不一定能180度躺平，但還是可以躺滿斜的)，但這個感覺就沒什麼斜", "reply": "N"}, {"type": "comment", "user": "@vicklee9040", "text": "最近要訂航空也很糾結😅謝謝阿滴受難😂", "reply": "N"}, {"type": "comment", "user": "@raychen623", "text": "偷偷跟阿滴說，華航桃園飛函館的商務艙也是這樣的，我之前也被震驚到不行😂", "reply": "N"}, {"type": "comment", "user": "@zszs-v2f", "text": "分享搭巴拿馬航空的垃圾體驗，會無故取消刷卡（試了三家，銀行都說已經沒擋，是航空自己取消的），其中一班椅子面是斜的，所以航程中，重量會壓在一側大腿與臀部，要一直站起來避免抽筋。\n回程行李箱摔裂了，找地勤結果說輪子沒事還可以用，不賠。\n如果是3-3機型，那一樣也是商務艙=豪經艙。\n台灣段是搭華航，回程深深體會到華航是天使，請收下我的忠誠🥹", "reply": "N"}, {"type": "comment", "user": "@TheJSheep", "text": "下次可以試看看COPA airline, Panama 跟美國之間是可以平躺的商務艙，飛機餐也不錯吃", "reply": "N"}, {"type": "comment", "user": "@margaretli0101", "text": "每次買business class我都會先查seat guru....看看seating map....", "reply": "N"}, {"type": "comment", "user": "@alisonshih5534", "text": "美國國內航空的商務艙很多時候真的是最前面的經濟艙把中間的位子Block掉，連中間的副手都沒有😂\n\n不過國際這樣蠻少見的", "reply": "N"}, {"type": "comment", "user": "@pipihuang7447", "text": "想到隔壁棚Hook的荷蘭航空😂", "reply": "N"}, {"type": "comment", "user": "@NAORI0618", "text": "看了影片…南美洲航空…我如果要搭，下次要做功課再搭，好怕😭", "reply": "N"}, {"type": "comment", "user": "@JackyWu.TwNo1", "text": "可以考慮挑戰印度航空😂", "reply": "N"}, {"type": "comment", "user": "@jjjj88521", "text": "印度經濟艙是在機翼嗎 掛在外面XD", "reply": "N"}, {"type": "comment", "user": "@ming2892", "text": "印度航班要挑戰的不是空間 而是混亂度和味道😆", "reply": "N"}, {"type": "comment", "user": "@wyc-m8q", "text": "又有飛機篇 pe": "comment", "user": "@toni4227", "text": "7700可以飛一趟釜山", "reply": "N"}, {"type": "comment", "user": "@57Qsxfyhjm57", "text": "被當盤子了", "reply": "N"}, {"type": "comment", "user": "@arronsom", "text": "第一眼看到機艙,我還以為是廉航開箱咧!?", "reply": "N"}, {"type": "comment", "user": "@道卡斯-TW", "text": "7700可以買大概100杯中杯棉被午茉綠唷...哈哈哈哈", "reply": "N"}, {"type": "comment", "user": "@miko6842", "text": "跟HOOK一樣獲得2個美美的盤子😂", "reply": "N"}]}, {"category": "旅程意外／GoPro／突發插曲", "label": "旅程意外／GoPro／突發插曲（2.9%）", "answered": 0, "unanswered": 14, "total": 14, "shareTotal": 2.9, "replyPct": 0.0, "unreplyPct": 100.0, "items": [{"type": "comment", "user": "@jyhoo1997", "text": "許多 LED 為了控制亮度，會使用 PWM（脈衝寬度調變，Pulse Width Modulation） 技術。 它的原理是透過「極快速地開啟和關閉燈光」來騙過人眼，讓你看起來覺得比較暗。這種閃爍頻率是由燈具內部的晶片決定的，完全不照市電的 50Hz 或 60Hz 規則走\n\n真正決定閃屏的是「快門速度」，而非「幀率」\n這裡要稍微釐清一個常見的觀念：幀率（fps）決定影片的流暢度，而快門速度（Shutter Speed）才是決定相機進光時間、並與燈泡閃爍頻率「對決」的關鍵。\n即使你將幀率設為 60fps，如果相機在自動模式下把快門速度拉高到 1/200s 甚至 1/500s，只要這個快門速度無法完整捕捉到燈泡明暗循環的週期，畫面上還是會出現一條一條的閃爍黑帶。\n\n可以嘗試以下幾個解法：\n 開啟相機的「防閃爍 / 高解析度快門」功能： 如果你使用的是較專業的相機或電影機（例如 Sony 的 Variable Shutter 或 Lumix 的 Synchro Scan），可以手動以小數點級別微調快門速度（例如從 1/60.0s 微調到 1/62.3s），直到螢幕上的閃爍線條消失為止。\n 手動固定快門，放慢速度： 進入 M 模式（手動模式），將快門速度降到最慢的安全值。例如你用 60fps 錄影，強制把快門鎖定在 1/60s（這也是動態模糊最自然的快門速度）。較慢的快門時間更長，能把 LED 開關的明暗週期「糊」在一起，有很大概率能減輕或消除閃爍。\n\nFrom Gemini❤", "reply": "N"}, {"type": "comment", "user": "@solartorbigcat", "text": "我曾經差點把筆電忘在安檢口，直到登機前才發現，幸好有追回來😂\n你不孤單", "reply": "N"}, {"type": "comment", "user": "@riva_isme", "text": "相機被自己搞丟，讓我直接想到另外一個創作者 凱文羊欣影片，他姊姊在國外送他的，結果拍攝影片把它放在戶外的長椅上，當然是整個不見了，真的是創作者噩夢。", "reply": "N"}, {"type": "comment", "user": "@asd413", "text": "阿滴掉過衣服，還是只穿過一次去別人緍禮😂", "reply": "N"}, {"type": "comment", "user": "@yi013ting", "text": "為什麼忘記相機，因為，這次太虧，老天爺多給素材🤣", "reply": "N"}, {"type": "comment", "user": "@陳意華-g3j", "text": "哈哈哈哈哈😂7700害你失神啦⋯⋯", "reply": "N"}, {"type": "comment", "user": "@35-------------P-dy", "text": "完全不理解 拿這個相機反正最後沒意外大部分人還是會修圖搞濾鏡 還不如用手機🤷 要買就買好一點的，啊不然就玩拍立得、底片、gopro就好，這台好像也沒有哪點特別突出就是浪費錢啊", "reply": : "N"}, {"type": "comment", "user": "@gakkiiyui", "text": "我之前去的時候 是選擇騎小馬上去的 而且顏色真的蠻鮮艷的", "reply": "N"}, {"type": "comment", "user": "@凌群-l5z", "text": "找個嚮導，租隻驢子，背個氧氣瓶吧", "reply": "N"}, {"type": "comment", "user": "@小魚兒oui", "text": "彩虹山完全不會想去😂😂", "reply": "N"}, {"type": "comment", "user": "@clisom0010", "text": "彩虹山長得好像甘肅張掖丹霞", "reply": "N"}, {"type": "comment", "user": "@neros0930", "text": "我也有去彩虹山，但實際上只爬40分鐘左右，\n沿途會有馬跟機車供體力不夠的人上山，也可以看見很清楚的彩虹拍照點。\n不確定阿滴是不是選錯行程了，因為照理來說爬到山頂會超多人的，\n不只不用爬那麼久，也可以看到圖片上的樣貌，\n其實包含我和身邊的朋友都很推薦彩虹山欸！", "reply": "N"}, {"type": "comment", "user": "@pinhsienlee203", "text": "阿滴最後在講彩虹山行程感想的時候感覺快哭了😂", "reply": "N"}, {"type": "comment", "user": "@bochen6913", "text": "會不會是雨季…..長草了", "reply": "N"}, {"type": "comment", "user": "@NingGeJuan", "text": "我是在天氣好下去彩虹山的，非常值得去一趟，太美了！", "reply": "N"}, {"type": "comment", "user": "@MelissaShuHuang", "text": "在祕魯對付高山症最好的方式，當地人推薦的傳統天然療法真的很有效。有看過當地人直接拿出古柯葉咀嚼😂", "reply": "N"}, {"type": "comment", "user": "@clamp3333", "text": "阿雷基帕是我在祕魯最喜歡最喜歡的城市，如果我再次去祕魯，我會為了它去，\n上次去我在阿雷基帕住了三個晚上\n事實上它是一座四周被大約 80 座火山環繞的城市，阿滴拍到的是埃爾米斯蒂火山 非常非常的壯觀和漂亮\n在高處看著離城市這麼近的火山，真的有它在撼動我的靈魂的感覺\n武器廣場旁邊的小博物館,有從那座火山被挖回來少女的化石，那是以前被村民拿去獻祭給山神的\n\n我沒有想到那次去祕魯，讓我最深刻的不是馬丘比丘，而是在阿雷基帕度過的那三天\nPS. 武器廣場二樓的餐廳真的不好吃XD", "reply": "N"}, {"type": "comment", "user": "@陳意華-g3j", "text": "天氣害的啦 哈哈哈哈哈哈哈😂😂", "reply": "N"}, {"type": "comment", "user": "@陳意華-g3j", "text": "這裡沒有氧氣罐的嗎？", "reply": "N"}, {"type": "comment", "user": "@yulilin", "text": "出去玩如果沒睡好再加上天氣不好還要走既定行程真的是很想翻臉，完全無法正面思考。\n我有一次出去玩就是這樣，兩個晚上沒睡好，白天下雨穿著雨衣走行程，導遊還要叫我們擺好笑的姿勢拍照……我……可不可以不要再逼我了😭", "reply": "N"}, {"type": "comment", "user": "@margarethsieh4283", "text": "好懷念雞湯麵喔 雞肉真的好嫩 彩虹山真的很值得去！ 建議人到了Cisco 之後 查彩虹山的天氣再決定哪一天要去天氣好的時候真的很漂亮 有兩個彩虹山可以讓你選 各有利弊 比較一下再決定報哪一個團", "reply": "N"}, {"type": "comment", "user": "@LIN-qc8pu", "text": "關於彩虹山的個人臆測～天氣不佳，雨跟霧影響能見度，濛上一層白灰。再者地面太潮濕，顏色必定變得暗淡不鮮豔。\n最後，那些網路上的照片可能都調整了對比跟飽和度😂。", "reply": "N"}, {"type": "comment", "user": "@shivaej", "text": "之前去馬丘比丘的時候也有順便去彩虹山 只能說天氣真的影響很大 我那天看到的真的和照片裡面的一樣 可惜阿滴上去的時候天氣真的太差了", "reply": "N"}, {"type": "comment", "user": "@zszs-v2f", "text": "阿滴的彩虹山竟然有修好的樓梯！😱我去年路邊報的ATV車團不知道被賣去哪個彩虹山野雞團，騎了20分鐘ATV車就說下車開始用爬的，最後來回走泥巴山路3.5小時，喘得像頻死的魚，還以為會高山症GG在上面😭", "reply": "N"}, {"type": "comment", "user": "@hukuen1", "text": "海拔那麼高竟然走了三個半小時⋯⋯太可怕了", "reply": "N"}, {"type": "comment", "user": "@zszs-v2f", "text": "@hukuen1就是海拔高，所以稍微走快就會很喘，只能慢慢慢慢走。但也有很厲害的國外情侶，不騎車，同時出發全程健行，我們剛爬到彩虹山頂，他們正好要下山。我們全團倒數第二爬完😅", "reply": "N"}, {"type": "comment", "user": "@shannonzhao1230", "text": "真的要去彩虹山，太美了。我是2025年6月去的，值得❤", "reply": "N"}, {"type": "comment", "user": "@haopinglei", "text": "冰雹的彩虹山我覺得才是最可貴的 漂亮的上網就有照片看了XDDD", "reply": "N"}, {"type": "comment", "user": "@judys7376", "text": "彩虹山天氣差真的可以果斷放棄😂", "reply": "N"}, {"type": "comment", "user": "@四月-g4m", "text": "我之前11月去~有看到漂亮的彩虹山歐!!", "reply": "N"}, {"type": "comment", "user": "@hosimdudu", "text": "我2019年去彩虹山天氣很不錯 真的是很漂亮欸！ 當初就是在機場看到彩虹山照片，所以更改行程！", "reply": "N"}, {"type": "comment", "user": "@Whateverla", "text": "去了墨西哥，看到秘魯又好想去玩喔～彩虹山想爬，但提醒了下雨就不用去了 😆", "reply": "N"}, {"type": "comment", "user": "@ldm32tw", "text": "2019年去了一趟祕魯(跟團).\n馬丘比丘、庫斯科、納斯卡線..都有去.\n彩虹山是全覽行程才有(幸好)\n後來2020年初疫情爆發.不曉得何時能再出國.\n當時就想..幸好有去祕魯了~", "reply": "N"}, {"type": "comment", "user": "@addison6680", "text": "剛從秘魯回來\n在庫斯科就很不舒服\n看了彩虹山的實際照片感覺會失望\n而且海拔更高就直接放棄了這個點 XD", "reply": "N"}, {"type": "comment", "user": "@chiukaiyu", "text": "為何不騎馬?", "reply": "N"}, {"type": "comment", "user": "@withkids0728", "text": "​@李政諺-b5t她是導遊？", "reply": "N"}, {"type": "comment", "user": "@ppoogfd", "text": "天氣超級差！！！\n我們當初直接選擇騎馬上山😂", "reply": "N"}, {"type": "comment", "user": "@ariellai4469", "text": "如果走另一段路線，可以騎ATV（沙灘車）上去，就不會這麼累，只要走50分鐘就到大彩虹山，而且沿途的紅谷風景超級美麗，我覺得更勝馬丘比丘，建議還是要功課做足再上山，比較不會失望，當然氣候條件也很重要，我們是從彩虹山下來時才下冰霰，雖然小狼狽但還是覺得不虛此行😊", "reply": "N"}, {"type": "comment", "user": "@jesuisbenoit", "text": "我的彩虹山也是完全一樣大傻眼\nhttps://www.instagram.com/stories/highlights/18327788488167163/", "reply": "N"}, {"type": "comment", "user": "@Kitty123-m6h", "text": "彩虹山也是滿多YT開過箱，還是特愛Do Do瑞的彩虹山~🤣", "reply": "N"}, {"type": "comment", "user": "@TheJSheep", "text": "我是今年二月去，彩虹山真的是我在秘魯覺得最不推的行程😂😂，顏色真的沒有網路上這麼鮮豔\n你們去的應該不是最紅的那個vinicunca，那個景點人很多開車要3個小時以上\n\n另外有一個很冷門的景點叫Waqrapukara，超美超震撼，但真的非常非常冷門\n\n然後Arequipa 我真的很喜歡，很生活化又很chill的城市，城市天氣好能看到火山真的很壯觀", "reply": "N"}, {"type": "comment", "user": "@agneskwan9731", "text": "剛剛4月尾去完，彩虹山是美爆，我覺得天氣是很重要，都跑那麼遠，還是請選對季節吧\n大晴天的彩虹山是不會令人失望", "reply": "N"}, {"type": "comment", "user": "@sherrykao1017", "text": "我也有看DoDo Eric的，不是最近的，已經好陣子了，原來行程這麼硬😅", "reply": "N"}, {"type": "comment", "user": "@ifangchen", "text": "阿滴應該多去爬爬山才知道不是每次都可以看到跟照片一樣的景\n因為高山的天氣太不可測了，等多爬幾次就會釋懷了", "reply": "N"}, {"type": "comment", "user": "@AnneTseng06", "text": "模仿薔薔那邊該不會還有修圖吧!? 很機車耶 但又好好笑🤣\n這集好豐富，感覺好像看了三集一樣~~~天竺鼠車車那邊蓋恐怖", "reply": "N"}, {"type": "comment", "user": "@TWGOGOBRO", "text": "Arequipa城市比較小一點, Cusco比較大又是印加帝國的中心, 所以推Cusco :) 當時沒吃高山症的藥, 所以有時候會sen sen 懶洋洋的 XD 真的要吃藥才能對抗高山症~", "reply": "N"}, {"type": "comment", "user": "@AnthonyLai120", "text": "阿滴跟兔免、小玩一起辛辛苦苦爬彩虹山，結果沒看到它的全貌，是有點失望，最後變成彩虹山受難記", "reply": "N"}, {"type": "comment", "user": "@chenjuhsieh6557", "text": "意外風景很美❤\n除了彩虹山不彩虹😢\n變嘟嘟瑞😂😂😂", "reply": "N"}]}, {"category": "人物互動（Cath／DoDo瑞／同行夥伴）", "label": "人物互動（Cath／DoDo瑞／同行夥伴）（13.9%）", "answered": 3, "unanswered": 42, "total": 45, "shareTotal": 13.9, "replyPct": 6.7, "unreplyPct": 93.3, "items": [{"type": "thread", "source_user": "@LexiYu_UGC", "source_text": "How Cath can make it successful and be travel the world, she's my idol now and a polygot . Hope we can have her interview next time! 😅", "author_user": "@rayduenglish", "author_text": "Cath他們有在開秘魯團喔！可以參考 onlyonetravel 的網站：https://tw.onlyone.travel/tours/peru-machu-picchu-10-day/", "confidence": "中", "method": "主題／上下文推定"}, {"type": "thread", "source_user": "@菌菌-d3b", "source_text": "Cath本來就是做旅行團的噢 only one travel (我記得是這個，有誤回來重編輯😂", "author_user": "@rayduenglish", "author_text": "Cath他們有在開秘魯團喔！可以參考 onlyonetravel 的網站：https://tw.onlyone.travel/tours/peru-machu-picchu-10-day/", "confidenc ter11010717", "text": "太厲害了❤爬的時候～腦袋會有空白的時候嗎？", "reply": "N"}, {"type": "comment", "user": "@bjaisiulu", "text": "我都會突然很害怕會想到有一些不好的畫面 但沒係這麽密集", "reply": "N"}, {"type": "comment", "user": "@fion7008", "text": "我也有時會突然夢到或想到最壞情況發生的畫面或夢境, 但是在這幾年才發生的... 我也是要計劃做好的人, 但不會像你一樣做到那麼細節, 我會留一點出錯的時間, 雖然不好的畫面跑出來, 但實際上也沒有發生, 多好啊... 可能我們是想比較遠的人, 把不好的也做好預備補足方法....另外, 你下次不要爬那麼高了, 平安最重要!", "reply": "N"}, {"type": "comment", "user": "@puipuimeow6973", "text": "我也會突然腦袋被插進來很多很不好的畫面\n從國小就這樣了 也都是很閒的時候會發生這種事情\n我也不知道為甚麼 但如果開始忙起來就不太會這樣了", "reply": "N"}, {"type": "comment", "user": "@nyanchaneru", "text": "危險的畫面我也會😂我相信是自己內心深處認定「生於憂患、死於安樂」這個道理😂", "reply": "N"}, {"type": "comment", "user": "@LHK2369", "text": "23:21 阿滴說的那個我也會，就是腦袋會插入一些很壞的意外畫面，然後我自己就會稍微警惕一下，類似防衛機制。", "reply": "N"}, {"type": "comment", "user": "@aoy1xl", "text": "24:01 一樣 感覺腦子裡突然插入了體驗100種死法 但是不能細想細想的話周邊都是危險😂😂", "reply": "N"}, {"type": "comment", "user": "@m88254943", "text": "其實就是類似焦慮症，做事很專注就沒有，但一定放鬆就會突然有不安的想法出現", "reply": "N"}, {"type": "comment", "user": "@simonwu2129", "text": "路過的時候還跟同行友人許願入住一晚，看完影片真覺得我應該會是崩潰的那種(然後腦袋三不五時出現自己掉下去的畫面)，感謝阿滴帶我們體驗一趟完整的Skylodge", "reply": "N"}, {"type": "comment", "user": "@洪均翔", "text": "24:23 侵入性思考（英語：intrusive thought）是指不受歡迎、非自願出現的想法、影像或令人不適的意念；它可能帶來困擾與痛苦，並讓人覺得難以控制或排除。\n\n「高處現象」（high place phenomenon）是常見的侵入性思考之一，例如身處高處時突然浮現「跳下去」的念頭。\n此症狀跟強迫症成正關聯\n來源：維基百科", "reply": "N"}, {"type": "comment", "user": "@你學廢了嗎-c9y", "text": "23:36 這邊完全懂，最恐怖的是前幾天遇到地震 我腦袋突然有個房子突然往前坍塌很真實的畫面 從小時候就有各式各樣的災難會在我腦袋炸開\n逛商場突然爆炸 走在路上被砸到之類的，完全深有體會xdd", "reply": "N"}, {"type": "comment", "user": "@dawdly", "text": "那個症狀叫\"Call of the Void\", 是很正常的啦~", "reply": "N"}, {"type": "comment", "user": "@youchen-b4b", "text": "23:50 阿滴沒想到也有絕命終結站的死神感應", "reply": "N"}, {"type": "comment", "user": "@Chloé__che", "text": "23:41 我也會這樣呢！被爆擊", "reply": "N"}, {"type": "comment", "user": "@アンとダイ", "text": "好能理解！！！我也會在很安全的狀況下會突然有一些很可怕的畫面在腦海🥹", "reply": "N"}, {"type": "comment", "user": "@matthewq2", "text": "以中醫的角度說 會有危險狀況插入腦中的情境 跟自我要求較高的人有關 神經很難完全放鬆 這 : "Cath不跟你一起住懸崖飯店,就知道有什貓膩了", "reply": "N"}, {"type": "comment", "user": "@mariko314", "text": "😂😂😂居然什麼都沒查就去了。\n阿滴太強了。\n我也懼高。我應該1-3米就不行，腳就很軟了。", "reply": "N"}, {"type": "comment", "user": "@karenhsu9988久久發發", "text": "難怪當P人的時刻,所以還有當P人的打算嗎? It's so crazy.🤣🤣🤣", "reply": "N"}, {"type": "comment", "user": "@DorisYoga-n9w", "text": "2:37 不好意思，對Ｐ人來說是上天給的禮物，Ｊ人才是天罰", "reply": "N"}, {"type": "comment", "user": "@starstarlight888", "text": "P人一定要看這集🤣🤣🤣", "reply": "N"}, {"type": "comment", "user": "@AfraOntheway___", "text": "我真的會笑死😂😂😂\n歡迎體驗P人的天罰🙈\n\n身為P人過去時常經歷各種：我沒想過是這樣啊啊啊🤯🤯🤯 的崩潰旅程\n\n現在的我，為了不要再被天罰，努力開發自己的做功課能力了🙏🏻\n寧願先忙一點，也不要最後把自己活生生搞死🤪\n\n從影片裡真的聽得出來阿滴聲音有多顫抖，恭喜阿滴陰錯陽差完成大挑戰👏🏻👏🏻👏🏻", "reply": "N"}, {"type": "comment", "user": "@ShanaSunTW", "text": "阿滴肯定不後悔當J人\n當P人跟團真的太驚喜(嚇)😂😂", "reply": "N"}, {"type": "comment", "user": "@BLUEDOG690285", "text": "這部影片太讚了，看文昌滴君驚恐的表情，還有成為P人的代價對觀眾來說真的是很新奇的體驗🤣Cath太好了，沒有暴雷阿滴太多🤣\n前幾天才在跟家人討論，為什麼阿滴的影片都這麼好看？\n家人回我說：「因為他都有先規劃過什麼地方要拍怎麼樣，有重點有主題影片才會好看」\n沒想到今天是一部沒有規劃的影片🤣🤣🤣\n不知道阿滴有沒有稍微克服拒高？期待阿滴不小心又挑戰了自己的恐懼🤣👍", "reply": "N"}, {"type": "comment", "user": "@coffeeholic945", "text": "Cath 竟然沒有事先勸退你 😮😮", "reply": "N"}, {"type": "comment", "user": "@jessieblue5166", "text": "Cath: 嘿嘿 老娘這次還不整到你!? 這種要求這輩子沒聽過 哈哈~", "reply": "N"}, {"type": "comment", "user": "@llliz.y", "text": "還好Cath沒有阻止你去，也沒有叫你做功課，不然應該不會有這支影片😂😂", "reply": "N"}, {"type": "comment", "user": "@deoxyribonucleic_acid1107", "text": "我也是P人但是什麼都不查也太誇張了哈哈哈哈哈哈都不會好奇嗎", "reply": "N"}, {"type": "comment", "user": "@jerryong8783", "text": "可以展開P滴系列了！很entertaining！（誤）XD", "reply": "N"}, {"type": "comment", "user": "@johnfoo8679", "text": "神灯Cath: 你确定？好 满足你的愿望！", "reply": "N"}, {"type": "comment", "user": "@PaulWang0430", "text": "34:54 許願 Cath 帶這團直接來一趟攀岩住宿行程🤩", "reply": "N"}, {"type": "comment", "user": "@PaulWang0430", "text": "34:54 哈哈哈 Cath 來剪尾刀🤣\n感覺其他人也要體驗一下啦～", "reply": "N"}, {"type": "comment", "user": "@遊戲人蔘Orz", "text": "看來需要安排些體能訓練了!!", "reply": "N"}, {"type": "comment", "user": "@smallqfang9263", "text": "這支影片後你可以改名叫阿批\nD to P的蛻變過程😂", "reply": "N"}, {"type": "comment", "user": "@SLSMusic", "text": "沒做功課，到了現場發現事情不對勁、還毅然決然地往上爬、超級smooth的過程、甚至這麼專業地完成從頭到尾的拍攝、太狂啦！！！", "reply": "N"}, {"type": "comment", "user": "@lzhh0813", "text": "Cath笑得好開心", "reply": "N"}, {"type": "comment", "user": "@yulilin", "text": "J人之中的J人阿滴竟然完全沒做功課，可見他有多信任Cath", "reply": "N"}, {"type": "comment", "user": "@wendychang6263", "text": "OMG好瘋狂喔，光是用看的就覺得很害怕，佩服阿滴可以這麼冷靜地爬完，然後中途還可以說話紀錄，一般人這種時候應該都大腦當機無法運轉了~~\n不過與其說是P人的天罰，不如說這是旅行中的意外收穫吧哈哈，就是因為沒有J人的規劃，所以會有更多驚喜(或驚嚇XD)", "reply": "N"}, {"type": "comment", "user": "@user679jk7", "text": "晚上爬也太恐怖 片尾的Cath太可愛了哈哈哈", "reply": "N"}, {"type": "comment", "user": "@aamanda08tw", "text": "Cath好壞😂😂😂根本就知道阿滴會有什麼感覺了，故意不跟你說", "reply": "N"}, {"type": "comment", "user": "@eurya7156", "text": "P人的影片 看起來特別好看耶 太厲害了!!!", "reply": "N"}, {"type": "comment", "user": "@TracyHuang211", "text": "這會不會是阿滴最man的一集，超敢的！\n（溜索在前座的表情控管🥴）為什麼Cathy不用上去？？", "reply": "N"}, {"type": "comment", "user": "@user-hc4ps9jz6w", "text": "我覺得Cath從幫阿滴安排這個行程開始也很期待這影片，所以也沒提醒阿滴要先去找一下資料，怕阿滴看完就會打消這念頭，謝謝Cath沒有提醒阿滴做功課我們才有這個阿滴突破自我的好片可以看。", "reply": "N"}, {"type": "comment", "user": "@LightIsTree", "text": "真的是沒有先做功課、搜尋🔍的P人旅遊者，阿滴説天罰 😂", "reply": "N"}, {"type": "comment", "user": "@ariellai4469", "text": "沒想到大J人阿滴沒做功課就去爬了，去過幾次百岳的我都還不敢嘗試，我也是3月在秘魯，不知道是不是阿滴剛好也在那，可惜沒遇到😊", "reply": "N"}, {"type": "comment", "user": "@mengyun4922", "text": "以後碰到Cath,不敢再這麼P了吧！😆\n但經過這一趟旅程，你已經不是以前那個阿滴了👍👍👍", "reply": "N"}, {"type": "comment", "user": "@paladinlin6700", "text": "我以為Cath也一起爬😆😆", "reply": "N"}, {"type": "comment", "user": "@_iris9977", "text": "懂了 不能當P人", "reply": "N"}, {"type": "comment", "user": "@amberchou261", "text": "這就是我們想看的P滴😊", "reply": "N"}, {"type": "comment", "user": "@chenjuhsieh6557", "text": "是不是還好阿滴沒做功課,不然就沒有這部影片了🤭🤭🤭😂\n真的還好阿滴是晚上爬，看得清楚更可怕…….", "reply": "N"}, {"type": "comment", "user": "@dorotheetw", "text": "好可怕 旅遊都不敢不做功課了，我要當膽小的 J 人", "reply": "N"}, {"type": "comment", "user": "@陳昶翰-k8r", "text": "最後Cath也笑太爽了吧XD\n確定沒有 // --- 將資料進行「從新到舊」的排序處理 ---
/* Order is pre-grouped: YouTube first, Instagram second. */

const body = document.body;
const menuList = document.getElementById("menuList");
const chartTitle = document.getElementById("chartTitle");
const chartDate = document.getElementById("chartDate");
const chartCanvas = document.getElementById("chartCanvas");
const drawer = document.getElementById("drawer");
const overlay = document.getElementById("overlay");
const closeBtn = document.getElementById("closeBtn");
const commentBox = document.getElementById("commentBox");
const drawerTitle = document.getElementById("drawerTitle");
const drawerMeta = document.getElementById("drawerMeta");

let activeMenuIndex = 0;
let activeRow = null;

function applyFixedChartScale() {
  const chart = document.getElementById("chartCanvas");
  const currentChart = ALL_CHARTS && ALL_CHARTS[activeMenuIndex];
  const rowCount = Math.max((currentChart && currentChart.data ? currentChart.data.length : 1), 1);

  if (!chart) return;

  if (window.innerWidth <= 1100) {
    chart.style.removeProperty("--row-h");
    chart.style.removeProperty("--bar-h");
    chart.style.removeProperty("--answer-top");
    chart.style.removeProperty("--unanswer-top");
    chart.style.removeProperty("--label-font");
    return;
  }

  /*
    Keep small/medium charts large, but make long charts fit inside one viewport.
    This fixes charts like「在日本退休是什麼感覺」being cut off at 100% zoom.
  */
  const availableHeight = Math.max(260, chart.clientHeight - 58);
  let rowH = Math.floor(availableHeight / rowCount);

  // Short charts should still look like the large default view.
  rowH = Math.min(52, rowH);

  // Long charts may shrink further, but not to an unreadable size.
  rowH = Math.max(18, rowH);

  const barH = Math.max(5, Math.min(14, Math.floor(rowH * 0.28)));
  const gap = Math.max(3, Math.floor(rowH * 0.13));
  const answerTop = Math.max(3, Math.floor((rowH - (barH * 2 + gap)) / 2));
  const unanswerTop = answerTop + barH + gap;
  const labelFont = Math.max(9, Math.min(15, Math.floor(rowH * 0.42)));

  chart.style.setProperty("--row-h", `${rowH}px`);
  chart.style.setProperty("--bar-h", `${barH}px`);
  chart.style.setProperty("--answer-top", `${answerTop}px`);
  chart.style.setProperty("--unanswer-top", `${unanswerTop}px`);
  chart.style.setProperty("--label-font", `${labelFont}px`);
}


function escapeHtml(s) {
  return String(s ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function getItems(d) {
  return d.items || d.comments || [];
}

function normalizeItem(c) {
  if (c.type === "thread" || c.type === "author_note") return c;

  return {
    type: "comment",
    user: c.user || c.source_user || "",
    text: c.text || c.source_text || "",
    reply: c.reply || c.answered || ""
  };
}



function buildMenu() {
  menuList.innerHTML = "";
  if (!ALL_CHARTS || ALL_CHARTS.length === 0) return;
  let lastPlatform = "";

  ALL_CHARTS.forEach((chart, idx) => {
    const titleText = String(chart.title || "");
    const platform = titleText.startsWith("Instagram｜") ? "Instagram" : "YouTube";

    if (platform !== lastPlatform) {
      const group = document.createElement("div");
      group.className = "menu-group";
      group.textContent = platform;
      menuList.appendChild(group);
      lastPlatform = platform;
    }

    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "menu-button";
    btn.dataset.index = idx;
    const cleanTitle = titleText.replace(/^YouTube｜/, "").replace(/^Instagram｜/, "");

    btn.innerHTML = `
      <span class="menu-index">${String(idx + 1).padStart(2, "0")}</span>
      <span>
        <span class="menu-title">${escapeHtml(cleanTitle)}</span>
        <span class="menu-date">${escapeHtml(chart.date)}</span>
      </span>
    `;

    btn.addEventListener("click", () => {
      selectChart(idx);
    });

    menuList.appendChild(btn);
  });
}

function setActiveMenu(index) {
  [...document.querySelectorAll(".menu-button")].forEach((btn, idx) => {
    btn.classList.toggle("active", idx === index);
  });
}

function selectChart(index) {
  if (!ALL_CHARTS || ALL_CHARTS.length === 0) return;
  
  activeMenuIndex = index;
  activeRow = null;
  closeDrawer();
  setActiveMenu(index);

  const chart = ALL_CHARTS[index];
  const platformLabel = String(chart.title || "").startsWith("Instagram｜") ? "Instagram" : "YouTube";
  const cleanChartTitle = String(chart.title || "").replace(/^YouTube｜/, "").replace(/^Instagram｜/, "");
  chartTitle.textContent = `${index + 1}. ${cleanChartTitle}`;
  chartTitle.dataset.platform = platformLabel;
  chartDate.textContent = chart.date;
  renderChart(chart.data);
  requestAnimationFrame(applyFixedChartScale);
}


function makeNiceTicks(maxCount) {
  maxCount = Math.max(0, Math.round(Number(maxCount || 0)));

  if (maxCount <= 0) {
    return [{ value: 0, pos: 0 }];
  }

  // Small charts need integer ticks only; this prevents duplicated labels like 0, 1, 1, 2, 2.
  if (maxCount <= 5) {
    return Array.from({ length: maxCount + 1 }, (_, value) => ({
      value,
      pos: (value / maxCount) * 100
    }));
  }

  const rawStep = maxCount / 4;
  const step = Math.max(1, Math.ceil(rawStep));
  const values = [0];

  for (let v = step; v < maxCount; v += step) {
    values.push(v);
  }

  values.push(maxCount);

  const uniqueValues = [...new Set(values)].sort((a, b) => a - b);

  return uniqueValues.map(value => ({
    value,
    pos: (value / maxCount) * 100
  }));
}

function renderChart(data) {
  chartCanvas.innerHTML = "";

  const labels = document.createElement("div");
  labels.className = "labels";
  const plot = document.createElement("div");
  plot.className = "plot";
  chartCanvas.appendChild(labels);
  chartCanvas.appendChild(plot);
  requestAnimationFrame(applyFixedChartScale);

  const maxCount = Math.max(...data.map(d => d.total || 0), 1);

  makeNiceTicks(maxCount).forEach(t => {
    const g = document.createElement("div");
    g.className = "gridline";
    g.style.left = t.pos + "%";
    plot.appendChild(g);

    const tick = document.createElement("div");
    tick.className = "tick";
    if (t.pos === 0) tick.classList.add("first-tick");
    if (t.pos === 100) tick.classList.add("last-tick");
    tick.style.left = t.pos + "%";
    tick.textContent = t.value;
    plot.appendChild(tick);
  });

  const axisTitle = document.createElement("div");
  axisTitle.className = "axis-title";
  axisTitle.textContent = "X 軸：留言數（則）";
  plot.appendChild(axisTitle);

  data.forEach(d => {
    const label = document.createElement("div");
    label.className = "row-label";
    label.textContent = d.label || d.category;
    labels.appendChild(label);

    const row = document.createElement("div");
    row.className = "bar-row";
    plot.appendChild(row);

    const answered = Number(d.answered || 0);
    const unanswered = Number(d.unanswered || 0);

    const answerW = answered / maxCount * 100;
    const unanswerW = unanswered / maxCount * 100;

    const barA = document.createElement("div");
    barA.className = "bar answer";
    barA.style.width = answerW + "%";
    row.appendChild(barA);

    if (answered > 0) {
      const pctA = document.createElement("div");
      pctA.className = "pct answer-pct";
      pctA.style.left = Math.max(answerW + 1, 1) + "%";
      pctA.textContent = Number(d.replyPct || 0).toFixed(1) + "%";
      row.appendChild(pctA);
    }

    const barN = document.createElement("div");
    barN.className = "bar unanswer";
    barN.style.width = unanswerW + "%";
    row.appendChild(barN);

    if (unanswered > 0) {
      const pctN = document.createElement("div");
      pctN.className = "pct unanswer-pct";
      pctN.style.left = Math.max(unanswerW + 1, 1) + "%";
      pctN.textContent = Number(d.unreplyPct || 0).toFixed(1) + "%";
      row.appendChild(pctN);
    }

    row.addEventListener("click", () => {
      if (activeRow) activeRow.classList.remove("active");
      row.classList.add("active");
      activeRow = row;
      openDrawer(d);
    });
  });
}

function openDrawer(d) {
  drawerTitle.textContent = d.category || "";
  drawerMeta.textContent =
    `共 ${d.total} 則｜佔全部 ${Number(d.shareTotal || 0).toFixed(1)}%｜作者有回覆 ${Number(d.replyPct || 0).toFixed(1)}%｜作者未回覆 ${Number(d.unreplyPct || 0).toFixed(1)}%`;

  commentBox.innerHTML = "";
  commentBox.scrollTop = 0;
  drawer.scrollTop = 0;

  getItems(d).map(normalizeItem).forEach(c => {
    if (c.type === "thread") {
      renderThread(c);
    } else if (c.type === "author_note") {
      renderAuthorNote(c);
    } else {
      renderComment(c);
    }
  });

  body.classList.add("drawer-open");
  overlay.classList.add("open");
  drawer.classList.add("open");
  drawer.setAttribute("aria-hidden", "false");
}

function renderThread(c) {
  const wrap = document.createElement("div");
  wrap.className = "thread";

  const source = document.createElement("div");
  source.className = "thread-source";
  source.innerHTML = `
    <div class="thread-labels">
      <div class="thread-badge source">被回覆留言</div>
      <div class="thread-meta">關聯信心：${escapeHtml(c.confidence || "中")}｜${escapeHtml(c.method || "推定關聯")}</div>
    </div>
    <div class="user">${escapeHtml(c.source_user || "未知留言者")}</div>
    <div class="comment-text">${escapeHtml(c.source_text || "")}</div>
  `;

  const reply = document.createElement("div");
  reply.className = "thread-reply";
  reply.innerHTML = `
    <div class="thread-labels">
      <div class="thread-badge reply">作者回覆</div>
      <div class="thread-meta">推定回覆鏈</div>
    </div>
    <div class="user reply-user">${escapeHtml(c.author_user || "作者")}</div>
    <div class="comment-text">${escapeHtml(c.author_text || "")}</div>
  `;

  wrap.appendChild(source);
  wrap.appendChild(reply);
  commentBox.appendChild(wrap);
}


function renderAuthorNote(c) {
  const card = document.createElement("div");
  card.className = "comment";
  const top = document.createElement("div");
  top.className = "comment-top";
  const user = document.createElement("div");
  user.className = "user";
  user.textContent = c.user || "@rayduenglish";
  const badge = document.createElement("div");
  badge.className = "badge y";
  badge.textContent = "作者留言";
  const text = document.createElement("div");
  text.className = "comment-text";
  text.textContent = c.text || "";
  top.appendChild(user);
  top.appendChild(badge);
  card.appendChild(top);
  card.appendChild(text);
  commentBox.appendChild(card);
}

function renderComment(c) {
  const card = document.createElement("div");
  card.className = "comment";

  const top = document.createElement("div");
  top.className = "comment-top";

  const user = document.createElement("div");
  user.className = "user";
  user.textContent = c.user || "未知留言者";

  const badge = document.createElement("div");
  const isY = c.reply === "Y";
  badge.className = "badge " + (isY ? "y" : "n");
  badge.textContent = isY ? "作者有回覆" : "作者未回覆";

  const text = document.createElement("div");
  text.className = "comment-text";
  text.textContent = c.text || "";

  top.appendChild(user);
  top.appendChild(badge);
  card.appendChild(top);
  card.appendChild(text);
  commentBox.appendChild(card);
}

function closeDrawer() {
  overlay.classList.remove("open");
  drawer.classList.remove("open");
  drawer.setAttribute("aria-hidden", "true");
  body.classList.remove("drawer-open");
}

overlay.addEventListener("click", closeDrawer);
closeBtn.addEventListener("click", closeDrawer);
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeDrawer();
});
window.addEventListener("resize", applyFixedChartScale);

// 若有資料，自動載入第一筆（最新的圖表）
if (ALL_CHARTS && ALL_CHARTS.length > 0) {
  buildMenu();
  selectChart(0);
}
</script>
</body>
</html>
